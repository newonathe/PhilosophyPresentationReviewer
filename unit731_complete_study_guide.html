ansitionStatus()},y="19.2.5"});var l={};l=r("dw37A");var o=r("bb5Bq"),s={};!function e(){if("u">typeof __REACT_DEVTOOLS_GLOBAL_HOOK__&&"function"==typeof __REACT_DEVTOOLS_GLOBAL_HOOK__.checkDCE)try{__REACT_DEVTOOLS_GLOBAL_HOOK__.checkDCE(e)}catch(e){console.error(e)}}(),s=r("74MqB");var o=(r("bb5Bq"),r("bb5Bq"));let u=[{year:"1931",title:"Manchurian Incident",content:"Japanese Kwantung Army engineers staged the explosion of a section of the South Manchuria Railway near Mukden (present-day Shenyang) and blamed Chinese dissidents ŌĆö a pretext to justify the full military invasion of Manchuria. This event, known as the Mukden Incident, gave Japan de facto control over Manchuria within months. The resulting isolation of the territory from international oversight would prove essential to Unit 731's later operations.",tag:"Context",tagColor:"#6b6560"},{year:"1932",title:"T┼Źg┼Ź Unit established",content:"Lt. Gen. Shir┼Ź Ishii established the initial predecessor facility, informally called the T┼Źg┼Ź Unit, at Zhongma Fortress near Mukden. Early experiments at this site tested plague and other pathogens on prisoners, as well as rudimentary weapons. A prisoner revolt in 1934 led to the facility's demolition and forced relocation to a more remote site. This period established the foundational practices: dehumanizing language for subjects, lethal experimentation protocols, and military-medical chain of command.",tag:"Founding",tagColor:"#c9a84c"},{year:"1935ŌĆō36",title:"Pingfang complex built; Imperial authorization",content:"Construction of the Pingfang complex outside Harbin began using forced labor. The site was expansive ŌĆö roughly six square kilometers ŌĆö and designed from the ground up for human experimentation: laboratories, prison blocks (capacity ~400 subjects), autopsy theaters, a crematorium, animal facilities, and a private airstrip. In 1936, Emperor Hirohito issued Imperial Decree No. 575, formally authorizing the Epidemic Prevention and Water Purification Department of the Kwantung Army. This is the bureaucratic name under which Unit 731 operated; the public framing was disease prevention for Japanese troops.",tag:"Infrastructure",tagColor:"#c9a84c"},{year:"1937",title:"Second Sino-Japanese War begins",content:"Japan's full-scale invasion of China in July 1937 dramatically expanded the scope of Unit 731's operations. The war created a large supply of prisoners of war and civilian detainees who became available as experimental subjects. It also justified, in the eyes of military planners, the urgent development of biological and chemical weapons. The war context normalized the dehumanization of Chinese, Korean, and Soviet nationals ŌĆö the primary victim populations ŌĆö within Japanese military culture.",tag:"Context",tagColor:"#6b6560"},{year:"1938ŌĆō1940",title:"Network expansion across occupied China",content:"Under the National Mobilization Law of 1938, Japan formally integrated military medical research into the war machine. Unit 731 expanded into a network of over 60 affiliated units across East and Southeast Asia: Unit 1855 in Beijing, Unit 1644 in Nanjing, Unit 8604 in Guangzhou, Unit 100 near Changchun (focused on veterinary/agricultural bioweapons), and others reaching into Korea, Malaysia, Singapore, and Thailand. All operated under public health cover. In 1940, Unit 731 conducted its first documented field deployment: aerial dispersal of plague-infected fleas over Ningbo, China, triggering an outbreak that killed hundreds of civilians.",tag:"Expansion",tagColor:"#c0392b"},{year:"1939ŌĆō1945",title:"Peak experimental operations",content:'The Pingfang complex conducted its most extensive lethal experiments. Victims ŌĆö referred to internally as maruta ("logs") ŌĆö were primarily Chinese civilians and POWs, Soviet soldiers, Koreans, and Mongolians, with some Allied prisoners documented. Experiments included: deliberate infection with plague, cholera, typhoid, anthrax, and dysentery; vivisection on conscious subjects without anesthesia; frostbite experiments involving ice-water immersion; pressure chamber experiments causing physical rupture; centrifuge testing; aerial weapons testing with subjects staked in open fields; nutritional deprivation; and blood transfusion experiments. In 1941, another field deployment targeted Changde, Hunan province with plague-infected fleas, contributing to a regional outbreak. Conservative direct death estimates from Pingfang alone: approximately 3,000. Broader estimates including field operations and affiliated units: tens of thousands to over 300,000.',tag:"Operations",tagColor:"#c0392b"},{year:"August 1945",title:"Dissolution and deliberate cover-up",content:"Following Japan's defeat, Ishii ordered immediate destruction of evidence: remaining subjects were executed, documents burned, facilities partially demolished. Personnel were dispersed and ordered to maintain permanent silence under threat of death. A cover story was prepared attributing any remaining physical evidence to a conventional water purification facility. This institutional destruction of evidence was itself a deliberate moral act ŌĆö demonstrating awareness of culpability and an attempt to prevent accountability.",tag:"Cover-up",tagColor:"#9c4a30"},{year:"1945ŌĆō1948",title:"US immunity negotiations",content:"American biological warfare investigators (Dr. Edwin Hill, Dr. Joseph Victor, and others) interviewed Ishii and former unit personnel in occupied Japan. Their classified assessment: the data ŌĆö particularly on plague, anthrax, and epidemic typhus derived from thousands of human subjects ŌĆö was unique and could not be ethically replicated. They recommended immunity from prosecution in exchange for full data transfer. General MacArthur approved. The research data was transferred to the U.S. Army biological warfare program at Camp Detrick (now Fort Detrick), Maryland. The State and Justice Departments were not fully consulted. The arrangement was kept classified for decades.",tag:"Post-War",tagColor:"#185FA5"},{year:"1949",title:"Khabarovsk War Crimes Trials",content:"The Soviet Union, having captured 12 former Unit 731 personnel (including Gen. Yamada Otoz┼Ź, commander of the Kwantung Army), conducted war crimes trials in Khabarovsk in December 1949. All 12 defendants were convicted and sentenced to labor camps ranging from 2 to 25 years. The transcripts, published by the Soviet government as a pamphlet in 1950, contained detailed and largely accurate accounts of Unit 731's activities. Western governments ŌĆö particularly the US ŌĆö officially dismissed the trials as Cold War propaganda at the time. This dismissal was motivated partly by the fact that the US had already granted immunity to the same figures the Soviets were exposing.",tag:"Trials",tagColor:"#185FA5"},{year:"1959ŌĆō1980s",title:"Postwar careers and historical suppression",content:'Shir┼Ź Ishii died in 1959 of throat cancer, never prosecuted. Many former Unit 731 researchers returned to prominent civilian careers: Masaji Kitano co-founded the Japan Blood Bank (now Green Cross Corporation, now Mitsubishi Tanabe Pharma); Shir┼Ź Kasahara became a leading figure in Japanese virology; multiple researchers took university professorships. The Japanese government maintained official silence on Unit 731 through the 1970s. In Japan, the topic was largely absent from school curricula and public discourse. Historical accountability began when journalist Seiichi Morimura published "The Devil\'s Gluttony" (Akuma no H┼Źshoku) in 1981, the first major Japanese-language expos├® of Unit 731, sparking public debate within Japan.',tag:"Legacy",tagColor:"#6b6560"},{year:"1985ŌĆō2000s",title:"Museum, declassification, lawsuits",content:"The Unit 731 Museum (õŠĄÕŹÄµŚźÕåøń¼¼731ķā©ķś¤ńĮ¬Ķ»üķÖłÕłŚķ”å) opened in Harbin, China in 1985, on the Pingfang site, serving as the primary archival and memorial institution. American documents confirming the immunity deal were declassified in stages beginning in the 1980s-90s (the full MacArthur immunity authorization wasn't publicly confirmed until 1998 via Freedom of Information Act releases). Chinese victims filed multiple lawsuits in Japanese courts seeking apology and compensation ŌĆö all were dismissed by 2002. The Japanese Supreme Court acknowledged historical facts of Unit 731 in 2007 while still upholding the dismissal of compensation claims, citing a 1972 joint communiqu├® in which China waived rights to reparations.",tag:"Reckoning",tagColor:"#6b6560"}],c=[{name:"Lt. Gen. Shir┼Ź Ishii",role:"Founding Commander",detail:"Born 1892, Chiba, Japan. Graduated Kyoto Imperial University medical school, earned his doctorate in bacteriology. Traveled to Europe and the US in 1928 to study biological warfare programs ŌĆö and their absence of adequate international prohibition. Returned convinced that biological weapons represented an unregulated military frontier. His proposal to Army leadership was framed as a defensive necessity: if Japan did not develop these weapons, enemies would. Commanded Unit 731 from founding until 1942, then returned in 1945. Negotiated his own immunity with U.S. authorities. Died 1959, age 67, having never been prosecuted."},{name:"Research Physicians & Scientists",role:"3,000+ personnel",detail:"Unit 731's research corps was drawn from Japan's top medical and scientific universities ŌĆö Tokyo, Kyoto, Osaka. Recruitment was presented as a prestigious military-scientific posting. The institutional structure was deliberately designed to normalize participation: subjects were officially classified as non-human (maruta), protocols were framed in neutral scientific language, and peer behavior provided social cover. Many were young physicians at the start of their careers who arrived at an institution already in operation. Post-war, this group benefited most directly from the impunity ŌĆö they returned to civilian careers, published research (sometimes based on Unit 731 data, without disclosure), and faced no criminal accountability."},{name:"Imperial Japanese Army & Government",role:"Institutional authorization",detail:"The Army's General Staff and Kwantung Army command provided ongoing operational authorization and substantial funding. The program's budget was concealed within broader military appropriations. Emperor Hirohito's Imperial Decree No. 575 (1936) provided formal legal sanction. The extent of Hirohito's personal knowledge of specific experimental activities remains historically contested ŌĆö but the program could not have expanded as it did without sustained institutional support at the highest levels of the military and government."},{name:"United States Government",role:"Post-war moral agent",detail:"The U.S. became a distinct moral agent through its post-war decisions. The immunity arrangement was negotiated between 1945-1948 by Army biological warfare intelligence operatives, approved by occupation command, and kept from public knowledge for decades. The justification: the data was militarily valuable and the Soviets should not benefit from a public trial. The decision was made without consultation of the victims or their representatives. It directly contradicted the legal standard being simultaneously applied at Nuremberg ŌĆö where Nazi doctors were prosecuted and executed for crimes of identical character."}],d=[{name:"Pathogen infection studies",description:"Subjects were deliberately infected with plague (bubonic and pneumonic), cholera, typhoid fever, anthrax, smallpox, botulism, and epidemic hemorrhagic fever through injection, ingestion, and environmental exposure. The purpose was to determine infectious doses, incubation periods, and transmission rates for weaponization. Many experiments involved multiple rounds of infection and observation, with subjects kept alive through infection cycles until their research utility was exhausted.",significance:"These experiments generated data on human pathogen response that had no ethical equivalent ŌĆö standard infectious disease research used animal models and voluntary human subjects. The data obtained informed later U.S. and Soviet biological warfare programs."},{name:"Vivisection",description:"Living subjects, often without anesthesia, underwent surgical procedures including organ removal, limb amputation, and systematic anatomical observation while conscious. The stated rationale was to observe physiological processes unaffected by the chemical changes that occur in dead tissue. Victims were sometimes kept alive across multiple procedures before being killed when further research utility was deemed exhausted.",significance:"Vivisection represented the most direct expression of the complete reduction of subjects to research material ŌĆö what Kant would identify as treating humanity purely as means. It is also the act most documented in post-war testimony from both perpetrators and witnesses."},{name:"Frostbite and hypothermia research",description:"Subjects were exposed to extreme cold ŌĆö outdoor winter exposure in Manchuria's harsh climate, immersion of limbs in ice-water buckets, and freezing of body parts using various methods. The research objective was to identify optimal field treatment for frostbite in Japanese soldiers. Subjects' limbs were frozen solid and then tested with hot water, fire, or simply thawing to observe tissue damage and recovery. Many subjects lost limbs; many died from exposure.",significance:"Ironically, the data from these experiments was later assessed by U.S. investigators as scientifically flawed and of limited actual military utility ŌĆö the conditions were not well-controlled enough to produce reliable generalizable data."},{name:"Weapons field testing",description:"Subjects were secured to stakes in outdoor test fields and exposed to artillery shells, grenades, and bombs filled with biological agents (plague-infected fleas, anthrax), chemical agents (mustard gas, phosgene), and incendiaries. The purpose was to test dispersal patterns, effective range, and casualty rates under field conditions. This testing directly bridged the laboratory and operational weapons deployment phases.",significance:"Field testing confirms that Unit 731 was not only a research program but an active weapons development program. The transition from laboratory experimentation to field deployment demonstrates deliberate weaponization intent."},{name:"Pressure and centrifuge experiments",description:"Subjects were placed in sealed pressure chambers, with pressure increased until physical rupture of blood vessels, eyes, and organs occurred. Centrifuge experiments tested the g-force tolerances of the human body. These experiments had ostensible applications in aviation medicine but were conducted on non-consenting subjects under conditions designed to produce fatal or near-fatal outcomes.",significance:"These experiments illustrate that the program extended beyond biological warfare into general military physiology research, demonstrating the breadth of human experimentation conducted."}];function f({title:e,children:t}){return(0,l.jsxs)("section",{className:"mb-10",children:[(0,l.jsx)("h2",{className:"text-lg font-bold text-[#c9a84c] mb-4 pb-2 border-b border-[#3a3733]",children:e}),t]})}function p({children:e}){return(0,l.jsx)("div",{className:"text-[#d4cfc8] leading-relaxed text-sm space-y-4",style:{fontFamily:"Georgia, serif"},children:e})}function h(){let[e,t]=(0,o.useState)(0),[n,a]=(0,o.useState)(null),[r,i]=(0,o.useState)(null);return(0,l.jsxs)("div",{children:[(0,l.jsxs)("div",{className:"mb-8 p-4 bg-[#1a1917] border border-[#c9a84c] rounded-lg",children:[(0,l.jsx)("p",{className:"text-[#c9a84c] text-xs font-bold mb-1",style:{fontFamily:"system-ui, sans-serif"},children:"YOUR PRESENTING QUESTION"}),(0,l.jsx)("p",{className:"text-[#f0ece4] text-base italic",children:'"What happened in the case?"'}),(0,l.jsx)("p",{className:"text-[#9c9690] text-xs mt-1",style:{fontFamily:"system-ui, sans-serif"},children:"30% of total presentation time (~7.5 minutes) ┬Ę Neutral, factual, no editorializing"})]}),(0,l.jsx)(f,{title:"Origins & Establishment",children:(0,l.jsxs)(p,{children:[(0,l.jsx)("p",{children:"Unit 731 emerged from a convergence of military ambition, imperial ideology, and scientific opportunism in early 1930s Japan. The broader context matters: Japan had been engaged in imperial expansion across East Asia since the late nineteenth century, driven by a combination of resource scarcity, nationalist ideology, and competition with Western colonial powers. The Manchurian Incident of 1931 ŌĆö a staged explosion on the South Manchuria Railway used as pretext for military invasion ŌĆö gave Japan control over a vast, isolated territory that would prove essential to the program's secrecy."}),(0,l.jsx)("p",{children:"Lt. Gen. Shir┼Ź Ishii, a trained microbiologist and military physician, became the program's architect. During a 1928 tour of European biological warfare programs, Ishii observed that the 1925 Geneva Protocol ŌĆö which prohibited the use of biological and chemical weapons in warfare ŌĆö had no verification mechanism and that no major power had actually ratified restrictions on development or stockpiling. He returned to Japan arguing that biological weapons represented a largely unregulated military frontier. His proposals found receptive audiences: military leadership was interested in asymmetric weapons that could offset Japan's industrial disadvantages relative to the United States and the Soviet Union."}),(0,l.jsx)("p",{children:'The program began in 1932 at Zhongma Fortress, Mukden, under the informal name "T┼Źg┼Ź Unit." Following a prisoner revolt in 1934, operations relocated to Pingfang, a district south of Harbin in Japanese-occupied Manchuria. By 1935, construction of a purpose-built complex was underway, funded through concealed military appropriations and built using forced labor. In 1936, Emperor Hirohito issued Imperial Decree No. 575, formally authorizing the Epidemic Prevention and Water Purification Department of the Kwantung Army ŌĆö the official bureaucratic name for Unit 731. The public designation was deliberate misdirection: the unit\'s actual mandate was the research and development of biological and chemical weapons through live human experimentation.'})]})}),(0,l.jsx)(f,{title:"The Moral Problem ŌĆö Defined Neutrally",children:(0,l.jsxs)(p,{children:[(0,l.jsx)("p",{children:"The central ethical problem is this: individuals with professional medical and scientific training ŌĆö operating within a formally authorized military institution ŌĆö made deliberate decisions to use human beings as non-consenting experimental subjects in lethal research programs. The decisions were not made in ignorance of their nature. The agents understood what the experiments would do to human bodies; that understanding was the point."}),(0,l.jsx)("p",{children:'What makes this an ethics case rather than simply a war crimes case is the specific role of scientific and medical professional identity. The perpetrators were not soldiers who happened to conduct experiments. They were trained physicians who used the methods of science ŌĆö controlled protocols, systematic observation, data recording ŌĆö while systematically violating every ethical obligation of medicine. The question the case poses is not only "why did this happen?" but "how did persons trained to preserve life come to systematically destroy it, within a framework they classified as research?"'}),(0,l.jsx)("p",{children:"Alternatives existed and were known. Defensive biological warfare research ŌĆö vaccine development, disease prevention, field sanitation ŌĆö was actively pursued by other nations' military medical corps without resort to human experimentation. The decision to use human subjects was driven by the desire for faster, more direct results and by the institutional conclusion that the subjects' lives had no value that constrained research design. e=>(0,l.jsxs)("div",{className:"bg-[#1a1917] border border-[#3a3733] rounded-lg p-4",children:[(0,l.jsx)("p",{className:"text-xs text-[#9c9690] mb-1",style:{fontFamily:"system-ui, sans-serif"},children:e.label}),(0,l.jsx)("p",{className:"text-2xl font-bold text-[#c9a84c]",style:{fontFamily:"system-ui, sans-serif"},children:e.value}),(0,l.jsx)("p",{className:"text-xs text-[#6b6560] mt-1",style:{fontFamily:"system-ui, sans-serif"},children:e.note})]},e.label))}),(0,l.jsxs)(p,{children:[(0,l.jsx)("p",{children:"The post-war outcomes constitute a second layer of moral failure. The Nuremberg Doctors' Trial (1946ŌĆō47) resulted in 7 executions and 9 prison sentences for Nazi physicians who conducted experiments of directly comparable character to Unit 731's. The simultaneous U.S. immunity deal for Unit 731's leadership created an explicit double standard: the principle that medical professionals could be criminally accountable for wartime human experimentation was applied to Germany but suspended for Japan. The stated justification ŌĆö military data of unique value ŌĆö was later assessed by historians to have been partially overstated; much of the data was of limited practical utility."}),(0,l.jsx)("p",{children:"The long-term consequences extend into the history of bioethics itself. The Nuremberg Code (1947) and the later Declaration of Helsinki (1964) ŌĆö the foundational documents of research ethics ŌĆö were drafted in direct response to wartime medical atrocities. Unit 731's escape from accountability meant that its specific lessons were not incorporated into the frameworks that emerged. Historians of bioethics have argued that the omission contributed to a lacuna in post-war medical ethics discourse regarding the obligations of researchers in military or state contexts."}),(0,l.jsx)("p",{children:"In Japan, public reckoning with Unit 731 began seriously only in the 1980s, following Seiichi Morimura's journalism and the opening of the Pingfang museum in China. Lawsuits by Chinese victims and their families were dismissed by Japanese courts through the 2000s. The Japanese government has acknowledged Unit 731's existence but has not issued a formal comprehensive apology for its activities. The question of full historical accountability remains unresolved."})]})]})]})}var o=r("bb5Bq");let m=[{citation:'Encyclop├”dia Britannica Editors. "Unit 731." Britannica.',year:"Updated regularly",url:"https://www.britannica.com/topic/Unit-731",type:"Encyclopedia",access:"Free",summary:"Comprehensive encyclopedic overview covering the unit's history, key figures, experiments, and post-war outcomes. Best starting point for establishing core facts. Citable in academic contexts as a tertiary reference.",bestFor:'Citing foundational facts in speech: "According to Britannica..."',reliability:5},{citation:'Keiichi Tsuneishi. "Unit 731 and the Japanese Imperial Army\'s Biological Warfare Program." Asia-Pacific Journal / Japan Focus.',year:"2005",url:"https://apjjf.org/-Keiichi-Tsuneishi/1665/article.html",type:"Academic Journal",access:"Free",summary:"Written by Japan's foremost historian on Unit 731. Covers internal organizational structure, funding mechanisms, the maruta classification system, and the post-war cover-up. Tsuneishi conducted primary research in Japanese archives.",bestFor:"Institutional structure details and the maruta naming practice",reliability:5},{citation:"United States National Archives. Declassified Documents on Unit 731.",year:"Declassified 1980sŌĆō2000s",url:"https://www.archives.gov/research/japanese-americans/unit-731",type:"Primary Source",access:"Free",summary:"U.S. government primary source documents confirming the immunity negotiations and data transfer arrangement. Includes the declassified Hill-Victor Report recommending immunity and MacArthur's authorization. The most authoritative source on the US immunity deal.",bestFor:"Post-war immunity section ŌĆö the single most authoritative source",reliability:5},{citation:"S apanese wartime atrocities. Useful for establishing geopolitical and military context in Part 1's origins section. Chang's work is widely known, making it easily recognizable to a general audience.",bestFor:"Contextualizing Unit 731 within broader Imperial Japanese military conduct",reliability:4},{citation:'Sheldon Harris & Jing-Bao Nie. "Discipline and the Ethics of Research: Unit 731 and the Post-War Period." Journal of Medical Ethics.',year:"2002",url:"https://jme.bmj.com/content/28/6/357",type:"Peer-Reviewed Medical Ethics",access:"May require institutional login",summary:"A collaborative analysis examining how Unit 731's data was used in post-war American and Japanese medical research, and the ethical implications of citing that data. Addresses the long-term scientific legacy dimension directly.",bestFor:'The "scientific legacy" angle in Section 3 (Go Beyond)',reliability:5},{citation:"Seiichi Morimura. The Devil's Gluttony (Akuma no H┼Źshoku). Kadokawa Shoten.",year:"1981 (Japanese) / Referenced in English scholarship",url:"https://apjjf.org/-Seiichi-Morimura/1658/article.html",type:"Investigative Journalism / Historical",access:"Japanese original; English references via APJ",summary:"The first major Japanese-language public expos├® of Unit 731, published in 1981. Its impact on Japanese public discourse is itself historically significant ŌĆö it broke the domestic silence around the unit's activities and sparked the first major public debate within Japan.",bestFor:"Explaining the timeline of historical suppression and when public reckoning began in Japan",reliability:4}];function g({n:e}){return(0,l.jsx)("span",{style:{fontFamily:"system-ui, sans-serif"},children:[1,2,3,4,5].map(t=>(0,l.jsx)("span",{className:t<=e?"text-[#c9a84c]":"text-[#3a3733]",children:"Ōśģ"},t))})}let y={Encyclopedia:"#185FA5","Academic Journal":"#1D9E75","Primary Source":"#c0392b","Academic Book":"#1D9E75","Peer-Reviewed Medical Journal":"#1D9E75","Peer-Reviewed Medical Ethics":"#1D9E75" , no penalty structure, and no restriction on development or testing. No major power had a domestic legal framework that explicitly prohibited military human experimentation.

This context matters for Part 1 in a specific way: it prevents a common analytical error in the presentation, which would be to argue that Unit 731 "violated international law." It did not violate law that existed at the time in any formally enforceable sense. What the ethical frameworks in Part 2 argue \u{2014} and what makes them essential \u{2014} is that the moral prohibitions violated by Unit 731 existed independently of positive law. Rights-based ethics, natural law, and Kantian deontology all ground their prohibitions in something other than legal code: human dignity, rational nature, inherent rights.

The Nuremberg Code of 1947 \u{2014} the foundational document of research ethics \u{2014} was drafted directly in response to the Nazi doctors' trial and established ten principles for the ethical conduct of human experimentation, beginning with voluntary informed consent. The Declaration of Helsinki (1964, World Medical Association) followed. These documents were not creating new moral obligations; they were recognizing and codifying obligations that already existed morally. Unit 731's escape from accountability at the time these frameworks were being written means that the lessons of its specific case were underrepresented in their formation.

Why this adds distinct value to Part 1: It allows the audience to understand the legal context without letting that context excuse the moral failure. It also sets up Part 2's ethical frameworks as doing necessary work \u{2014} they provide the moral vocabulary that the legal system of 1940 lacked.`},{title:"The maruta system: institutionalized dehumanization",badge:"Institutional Mechanism",badgeColor:"#c9a84c",summary:'The use of the word "maruta" was not casual cruelty ŌĆö it was a deliberate institutional practice embedded in administrative language. Understanding how it worked reveals how a research culture normalized atrocity.',expanded:`The word maruta means "logs" in Japanese. Within Unit 731, it was the official administrative designation for human experimental subjects. The term appeared in internal documentation, record-keeping, and verbal communication within the unit. Subjects were entered into research logs not by name or prisoner number but as maruta \u{2014} material to be processed.

This linguistic practice was not incidental. It was a mechanism of what sociologists call moral disengagement \u{2014} a deliberate institutional technique for removing experimental subjects from the moral consideration typically extended to persons. If subjects are "logs," not people, then the moral prohibitions attached to persons (don't harm, don't kill, respect autonomy) do not apply. This same mechanism was documented in Nazi medical facilities, where Jewish prisoners were classified as Untermenschen (subhumans) and in U.S. Cold War-era radiation experiments, where subjects were referred to by code rather than name.

The maruta system worked through several reinforcing elements: dehumanizing language in documentation, physical separation of the prison block from research areas (subjects arrived blindfolded), prohibition on researchers learning subjects' names or histories, and a military hierarchy that punished any sign of empathy toward subjects as a compromise of scientific objectivity. The institutional design actively cultivated the conditions under which participation in atrocity felt professionally normal.

This is directly relevant to Part 3's Kohlberg analysis \u{2014} the maruta system was part of what kept researchers at Stage 4 (conventional morality, follow institutional rules) by making the institutional rules feel self-evidently legitimate. It is also directly relevant to Aristotle's virtue ethics in Part 2: the unit cultivated vices through repeated institutional practice. Part 1 can establish this as a documented factual mechanism; Parts 2 and 3 then analyze why it was wrong and how it enabled moral failure.`},{title:"The victims: who they were",badge:"Victim Demographics",badgeColor:"#c0392b",summary:"Victims are frequently discussed in aggregate numbers. Specifying their identities, nationalities, and circumstances humanizes the case and grounds the rights-based analysis.",expanded:`The victims of Unit 731's experiments were predominantly Chinese \u{2014} civilians arrested by Japanese occupation forces in Manchuria and occupied China, often on vague charges of espionage, resistance, or simply being in the wrong location at the wrong time. Chinese POWs captured in the ongoing Sino-Japanese War comprised another major group. Soviet soldiers captured during border conflicts (including the Battle of Khalkhin Gol, 1939) were also documented as subjects. Korean civilians \u{2014} many living in Manchuria as colonial subjects of Japan \u{2014} were among the victims. Mongolian prisoners are documented in the historical record. A smaller number of Allied prisoners, including some American and Australian soldiers, are believed to have been used as subjects, though this remains less fully documented due to U.S. interests in suppressing the inquiry.

The age range of victims included adults of both sexes and, in documented cases, children. Some female victims were deliberately infected with sexually transmitted diseases; some pregnant women were used in experiments studying the effects of pathogens on fetuses. The victim population was defined by their vulnerability \u{2014} statelessness, prisoner status, ethnicity, and geographic location in occupied territory \u{2014} rather than by any individual action.

The victims never had legal representation, never knew what was being done to them in scientific terms, and in most cases were killed upon the conclusion of experiments or when the facility was dissolved. Their remains were cremated on-site. No restitution has been paid to surviving families. No comprehensive official list of victims exists because records were deliberately destroyed in 1945.

Why this adds distinct value: The victim demographics are a factual matter that Part 1 is uniquely positioned to establish. It prevents the case from being discussed in purely abstract terms ("3,000 subjects") and grounds the rights-based and natural law frameworks in the reality of specific human persons. It also directly answers a likely defense question: "Who were the victims?"`},{title:"Comparison with Nazi experimentation: the double standard",badge:"Historical Comparison",badgeColor:"#9c4a30",summary:"The Nazi Doctors' Trial (1946-47) prosecuted and executed physicians for crimes virtually identical to Unit 731's. The contrast is not rhetorical ŌĆö it is a documented historical fact with direct implications for accountability.",expanded:`The Nuremberg Doctors' Trial (officially United States of America v. Karl Brandt et al., 1946\u{2013}47) prosecuted 23 German physicians and administrators for conducting human experimentation in concentration camps. The experiments included deliberate infection with typhus and malaria, hypothermia experiments (identical in method to Unit 731's frostbite research), high-altitude pressure experiments (virtually identical to Unit 731's pressure chamber experiments), and surgical experiments on living subjects without consent. Seven defendants were executed; nine received prison sentences.

The factual parallel to Unit 731 is precise: same categories of experiments, same victim population type (prisoners classified as non-persons), same institutional framework (state-authorized military medical research), same professional identities of perpetrators (trained physicians). The Nuremberg Code, issued as part of the trial's judgment, established that voluntary informed consent is "absolutely essential" \u{2014} a standard directly violated by both programs.

The post-war divergence is equally precise: Nazi doctors were prosecuted within two years of the war's end. Unit 731's leadership was granted immunity by the same nation that prosecuted Nazi doctors at Nuremberg, during the same time period, for the same stated reason (national security, data value). The U.S. Army's own assessment of the Unit 731 data \u{2014} available in declassified documents \u{2014} acknowledges the direct comparison while recommending immunity anyway.

This factual comparison is not available to Part 2 or Part 3 to develop as context \u{2014} it is a factual and historical matter. Part 1 establishing it clearly gives the audience the framework to understand that the post-war impunity was a deliberate policy choice in the face of a clear precedent, not an oversight.`},{title:"Post-war careers: the return to civilian science",badge:"Legacy",badgeColor:"#6b6560",summary:"Many Unit 731 researchers returned to prominent civilian careers in Japanese medicine and science. This is a documented factual record ŌĆö not analysis ŌĆö and it illuminates the depth of the institutional failure of accountability.",expanded:`The post-war careers of Unit 731 personnel constitute one of the most troubling documented facts of the case. Unlike their Nazi counterparts \u{2014} many of whom were imprisoned, executed, or professionally destroyed \u{2014} Unit 731's researchers largely returned to ordinary and often distinguished civilian lives.

Masaji Kitano, who served as Unit 731's commander from 1942 to 1945 (when Ishii returned), co-founded the Japan Blood Bank (\u{65E5}\u{672C}\u{30D6}\u{30E9}\u{30C3}\u{30C9}\u{30D0}\u{30F3}\u{30AF}) in 1952, which became Green Cross Corporation, later acquired by Mitsubishi Tanabe Pharma. He also published scientific research post-war. Shir\u{14D} Kasahara became a prominent virologist and was involved in the post-war development of Japanese public health infrastructure. Naito Ry\u{14D}ichi, another Unit 731 member, co-founded the pharmaceutical company Midori Juji, which was later involved in the Japanese HIV-tainted blood products scandal of the 1980s-90s \u{2014} a connection historians have cited as illustrating the long shadow of the unit's institutional culture.

Multiple former researchers took university professorships at leading Japanese institutions. Some published post-war medical research that may have drawn on Unit 731 data without disclosure. The Japan Blood Bank/Green Cross connection is particularly documented: historians including Sheldon Harris have traced personnel and institutional relationships between Unit 731 and post-war pharmaceutical companies.

This factual record raises the question that Part 3's moral agency analysis addresses: how does institutional accountability fail so completely that perpetrators are rewarded rather than punished? Part 1 establishes the documented fact; Part 3 provides the moral vocabulary to understand what that failure means.`},{title:"The suppression timeline: five decades of silence",badge:"Historical Suppression",badgeColor:"#6b6560",summary:"The history of how Unit 731's records were suppressed and gradually disclosed is itself a factual narrative ŌĆö one that explains why comprehensive historical accounting took so long.",expanded:`The suppression of Unit 731's history operated through several simultaneous mechanisms over five decades. Understanding this timeline is important for Part 1 because it explains why the public did not know about this case for so long, and it frames the ongoing recognition dispute as a structural consequence of deliberate historical management.

1945: Ishii orders destruction of physical evidence and execution of surviving subjects. Personnel are dispersed with explicit instructions to maintain silence.

1945\u{2013}1948: U.S. occupation authorities conduct secret immunity negotiations. The arrangement is kept classified. American journalism and public discourse about Unit 731 is essentially nonexistent during the occupation period.

1949: The Soviet Union's Khabarovsk trials present detailed evidence. Western governments dismiss the trials as propaganda. The transcripts are published by the Soviet government but receive minimal Western circulation.

1950s\u{2013}1970s: In Japan, Unit 731 is absent from school curricula and official historical discourse. The Japanese government maintains silence. Veterans of the unit do not speak publicly. A small number of former researchers write memoirs that circulate in limited circles, often without identifying themselves by their Unit 731 role.

1981: Seiichi Morimura publishes "The Devil's Gluttony" (Akuma no H\u{14D}shoku), the first major Japanese-language public expos\xe9. The book causes significant public controversy within Japan and for the first time brings widespread domestic awareness.

1985: The Unit 731 Museum opens in Harbin, China, on the Pingfang site. China begins more actively documenting and publicizing the unit's history.

1986\u{2013}1993: John Powell, a U.S. journalist, publishes research on the immunity deal in the Bulletin of the Atomic Scientists. The story receives attention in the U.S. for the first time.

Late 1980s\u{2013}2000s: American documents related to the immunity deal are declassified in stages through Freedom of Information Act requests. The full MacArthur immunity authorization is confirmed publicly by 1998.

2007: The Japanese Supreme Court acknowledges the historical facts of Unit 731 in the context of dismissing compensation lawsuits, citing the 1972 Sino-Japanese joint communiqu\xe9.

This timeline demonstrates that the suppression was not a natural fade of historical memory \u{2014} it was an active, multi-party effort involving the Japanese government, the U.S. government, and individual veterans. Establishing this in Part 1 gives the audience context for why this case, despite its scale, remained outside public awareness for so long.`},{title:"Field biological weapons deployment: beyond the laboratory",badge:"Operational Scale",badgeColor:"#c0392b",summary:"Unit 731 was not only a laboratory program. It operationally deployed biological weapons against civilian populations. This extends the case beyond research ethics into weapons use and makes the victim count far higher.",expanded:`A dimension of Unit 731's activities that is often underemphasized is that it transitioned from laboratory research to active operational deployment of biological weapons. This transition confirms that the unit's purpose was not only scientific but directly military and offensive.

Documented field deployments include:

Ningbo, Zhejiang Province, China (October 1940): Japanese aircraft dispersed plague-infected fleas and contaminated wheat over the city. A subsequent plague outbreak affected the civilian population, with documented casualties in the hundreds. Post-war epidemiological analysis linked the outbreak to the aerial dispersal.

Changde, Hunan Province, China (November 1941): Similar aerial dispersal of plague-infected materials. A subsequent plague epidemic in the region resulted in documented civilian deaths.

Operations along the Zhejiang-Jiangxi Railway Campaign (1942): Biological contamination of water sources, food supplies, and field positions during military operations. Historians estimate thousands of Chinese civilian and military casualties from these field operations.

Raid on the Zhongshan Bridge, Nanjing area: Documented use of cholera and typhoid contamination of water supplies.

These operations were planned and executed by Unit 731 personnel in conjunction with Kwantung Army and other unit operations. The distinction from laboratory experimentation is significant: field deployment means that persons who had no contact with the Pingfang facility, who were not prisoners or captured combatants, were deliberately made victims of the biological warfare program. The casualty figures from field operations \u{2014} estimated at tens of thousands to over 300,000 across all biological warfare operations \u{2014} vastly exceed the documented laboratory deaths.

This factual dimension is important for Part 1 because it ensures the presentation does not inadvertently minimize the case by confining it to laboratory ethics. The field operations make Unit 731 not only a case of medical research ethics violations but of weapons of mass destruction use against civilian populations.`}];function w(){let[e,t]=(0,o.useState)(0);return(0,l.jsxs)("div",{children:[(0,l.jsxs)("div",{className:"mb-6 p-4 bg-[#1a1917] border border-[#c9a84c] rounded-lg",children:[(0,l.jsx)("p",{className:"text-[#c9a84c] text-xs font-bold mb-1",style:{fontFamily:"system-ui, sans-serif"},children:"WHY THIS SECTION EXISTS"}),(0,l.jsx)("p",{className:"text-[#d4cfc8] text-sm",style:{fontFamily:"Georgia, serif"},children:"Your groupmates' parts cover ethical frameworks (Part 2) and moral agent analysis (Part 3). This section identifies factual and contextual dimensions that only Part 1 can establish ŌĆö angles that add distinct value without overlapping their work."})]}),(0,l.jsx)("div",{className:"flex flex-col gap-3",children:v.map((n,a)=>(0,l.jsxs)("div",{className:`border rounded-lg overflow-hidden bg-[#1a1917] transition-all ${e===a?"border-[#c9a84c]":"border-[#3a3733]"}`,children:[(0,l.jsxs)("button",{className:"w-full flex items-start gap-3 px-4 py-4 text-left",onClick:()=>t(e===a?null:a),children:[(0,l.jsxs)("div",{className:"flex-1",children:[(0,l.jsx)("div",{className:"flex items-center gap-2 mb-1 flex-wrap",children:(0,l.jsx)("span",{className:"text-xs px-2 py-0.5 rounded",style:{background:n.badgeColor+"22",color:n.badgeColor,fontFamily:"system-ui, sans-serif"},children:n.badge})}),(0,l.jsx)("p",{className:"text-sm font-bold text-[#f0ece4]",children:n.title}),(0,l.jsx)("p",{className:"text-xs text-[#9c9690] mt-1",style:{fontFamily:"system-ui, sans-serif"},children:n.summary})]}),(0,l.jsx)("span",{className:"text-[#6b6560] text-xs mt-1 shrink-0",children:e===a?"Ō¢▓":"Ō¢╝"})]}),e===a&&(0,l.jsx)("div",{className:"px-4 pb-5 border-t border-[#3a3733]",children:(0,l.jsx)("div",{className:"mt-4 text-sm text-[#d4cfc8] leading-relaxed whitespace-pre-line space-y-3",style:{fontFamily:"Georgia, serif"},children:n.expanded.split("\n\n").map((e,t)=>(0,l.jsx)("p",{children:e},t))})})]},a))})]})}var o=r("bb5Bq");let x=[{label:"Part 1 ŌĆö The Facts",color:"#c9a84c",part:"Your section",questions:[{q:"How certain are historians about the figure of 3,000 victims? Why is the range so wide?",a:"The 3,000 figure refers specifically to documented deaths within the Pingfang complex, derived from post-war testimony and partial records that survived deliberate destruction. The broader estimates (up to 300,000+) incorporate deaths from field biological weapons deployments across occupied China, affiliated units in Beijing, Nanjing, Guangzhou and elsewhere, and indirect casualties from engineered disease outbreaks ŌĆö populations whose deaths are harder to document because records were deliberately destroyed and operations were geographically dispersed across a war zone. Scholars treat 3,000 as a conservative floor for laboratory deaths, not a ceiling for total casualties.",tip:'The key phrase: "conservative floor, not a ceiling." This shows you understand the methodological issue.'},{q:"Why did the United States grant immunity instead of prosecuting? What was the actual strategic rationale?",a:"American biological warfare investigators assessed that the data ŌĆö particularly on plague, anthrax, and epidemic typhus derived from controlled human subjects ŌĆö was unique and could not be ethically replicated. Their classified recommendation argued that public prosecution would require disclosing the data's nature and methods, potentially allowing the Soviet Union to access or claim it during early Cold War competition. General MacArthur approved the arrangement. Crucially, this decision was made during the same period the U.S. was prosecuting Nazi doctors at Nuremberg for virtually identical crimes. The decision was strategic, not a matter of factual uncertainty about what Unit 731 had done.",tip:"The Nuremberg comparison is your strongest card here. Same era, same crime category, opposite outcome."},{q:"The unit had a public health cover. Was any legitimate work actually done?",a:"Some genuine epidemic prevention and water sanitation work was conducted for Japanese troops ŌĆö the broader network of units did perform legitimate public health functions as part of their operational mandate. However, the Pingfang complex specifically was designed and built exclusively for weapons research and human experimentation. The public health framing was the institutional alibi that allowed the program to exist within the formal military structure and access government funding. The cover also served post-war: it was the story Ishii's personnel were instructed to maintain if questioned.",tip:"Acknowledge the nuance ŌĆö some legitimate work existed ŌĆö but be clear that the Pingfang facility was entirely experimental."},{q:"What happened to Ishii after the war?",a:"Ishii cooperated fully with American occupation investigators, providing detailed accounts of the unit's research in exchange for immunity. He gave multiple interviews to U.S. Army biological warfare researchers through 1947. He then returned to private life in Japan, gave at least one documented lecture to U.S. military researchers in the early 1950s on the unit's findings, and died of throat cancer in 1959 at age 67. He was never arrested, indicted, or publicly held accountable during his lifetime. His death preceded the first major Japanese public expos├® of Unit 731 by over two decades.",tip:"The 1959 death date matters ŌĆö he died before the 1981 expos├®, which is why Japan's domestic reckoning came too late for him."},{q:"Why does this case specifically qualify as Ethics in Science rather than a war crimes case?",a:"The case qualifies because its perpetrators were trained scientists and physicians who operated within a formal research institution using the methods and language of science ŌĆö controlled protocols, systematic data recording, peer review within the unit, research publication channels. The ethical failure is not only military; it is a failure of scientific and medical professional identity. The researchers made choices as scientists ŌĆö they designed protocols, recorded results, analyzed data ŌĆö while systematically violating every ethical obligation of their profession. War crimes cases address the use of violence in conflict. Ethics in Science addresses what happens when scientific methodology is deployed without ethical constraint. Unit 731 is both, but it is most distinctively the latter.",tip:"This is the most important question for your defense. Know this answer cold."}]},{label:"Part 2 ŌĆö Ethical Frameworks",color:"#1D9E75",part:"Groupmate's section",questions:[{q:"Under utilitarianism, couldn't someone argue the research data saved more lives than were lost?",a:"Two responses. First, empirical: the data obtained produced no documented battlefield medical breakthroughs of comparable scale ŌĆö much of it was assessed by U.S. investigators as methodologically flawed due to poor experimental controls. The hypothetical lives saved are speculative; the deaths are documented. Second, rule utilitarian: a rule permitting medical institutions to sacrifice non-consenting individuals produces catastrophic long-term harm to social trust in medicine globally ŌĆö the indirect costs across all future medical practice would dwarf any claimed benefit. The utilitarian calculus fails on its own terms.",tip:"Rule vs. act utilitarianism is the key distinction here. Your group's analysis likely uses both; be ready to explain the difference."},{q:"Kant's categorical imperative requires universalizable maxims. Could a Japanese physician argue they were following a universalizable duty to protect Japan?",a:'No ŌĆö the universalizability test requires that the maxim hold for all rational agents, not for members of one nation. The maxim "medical researchers may kill non-consenting subjects from enemy populations to advance national power" cannot be universalized without destroying both the institution of medicine and the principle of non-combatant protection. Applied globally, it produces a world where no medical professional or civilian is safe from any state\'s research agenda. The maxim self-destructs under universalization ŌĆö it fails the formula of universal law.',tip:"The key move: a nationalist maxim can never be universalized because it is contingent on group membership, not rational agency."},{q:"Rights-based ethics says rights exist regardless of law. But there was no international law explicitly prohibiting this in 1940. Does that affect the analysis?",a:"No ŌĆö this is precisely the defining feature of rights-based ethics. Rights are pre-legal: they exist and are morally binding regardless of whether positive law recognizes them. The argument is not that Unit 731 violated a law that existed in 1940; it is that the rights violated ŌĆö to life, dignity, autonomy, consent ŌĆö are not created by law. The Nuremberg Code did not create these rights in 1947; it recognized and codified them in response to their systematic violation. The absence of codification does not mean the moral obligation was absent.",tip:'The phrase "pre-legal" is the key term. Rights-based ethics grounds obligations in humanity, not legislation.'},{q:"Virtue ethics applies to individuals. How does it apply to an institution like Unit 731?",a:"Classical Aristotelian virtue ethics applies primarily to individuals, but institutions shape individual character formation through their reward structures, language, norms, and hierarchy. Unit 731's institutional design ŌĆö the maruta classification, the prohibition on learning subjects' names, the peer culture that normalized experimentation ŌĆö actively cultivated vices rather than virtues. The institution is culpable not as a moral agent itself but as a structure that systematically prevented the development of phronesis (practical wisdom) and moral courage in its members. Contemporary virtue ethics scholarship supports this extension: character is formed through environment as much as through individual choice.",tip:"The transition from individual to institutional virtue ethics is the sophisticated move. It acknowledges the limitation while extending the analysis."},{q:"Natural law says morality is grounded in human nature. Can't someone argue wartime aggression IS natural?",a:'Natural law theory distinguishes between instinctual behavioral tendencies and the rational moral order derived from human nature. War-driven aggression may be a documented human tendency, but natural law holds that human beings have a rational nature that inclines them toward life, truth, and community ŌĆö these are the normatively natural inclinations, not the ones that happen to occur under stress. The claim "we naturally harm enemies in war" describes behavior; natural law asks what our rational nature is oriented toward. Systematic destruction of persons as research objects is not an expression of rational nature ŌĆö it contradicts the natural inclination toward life and social harmony that natural law identifies as foundational.',tip:"The distinction is between descriptive natural facts (we sometimes do X) and normative natural law (our rational nature tends toward Y). Keep these separate."}]},{label:"Part 3 ŌĆö Moral Agency",color:"#185FA5",part:"Groupmate's section",questions:[{q:"Kohlberg's Stage 4 means following institutional rules. But weren't researchers also following Japanese law? How is that not Stage 5?",a:'Stage 4 moral reasoning follows rules because they are the rules of one\'s institution or society, without critically evaluating whether those rules are just. Stage 5 and 6 reasoning evaluates laws and institutional norms against universal principles ŌĆö asking not "what does the system require?" but "what does justice and human dignity require, independently of what the system says?" The researchers were at Stage 4 because they accepted the institutional framing ŌĆö maruta, military hierarchy, research mission ŌĆö as sufficient justification without questioning whether the system\'s rules were morally legitimate. Someone at Stage 5 would ask: "Does the fact that the military authorizes this make it right?" The researchers did not ask that question.',tip:"Kohlberg's stages are about the structure of moral reasoning, not the content of the rule being followed. Stage 4 accepts institutional authority as the source of moral obligation; Stage 5 questions that authority."},{q:"Aristotle's phronesis is practical wisdom. These researchers were highly educated. Doesn't that imply they had it?",a:"Phronesis is not equivalent to intelligence or formal education. It is the trained disposition ŌĆö built through habitual ethical choice ŌĆö to perceive the moral dimension of a situation and to act on it with appropriate moral courage. The researchers had the intellectual capacity to perceive the harm being done: post-war testimonies confirm that many were uncomfortable, some requested transfers, some described distress. What they lacked was the habituation of moral courage ŌĆö the character developed through repeated ethical choice that enables action against institutional pressure at personal cost. Aristotle is explicit that virtues are developed through practice, not granted by intelligence. Unit 731's institutional structure actively prevented the development of this habituated moral courage.",tip:'The move from "they knew it was wrong" to "they couldn\'t act on that knowledge" is the Aristotelian insight. Phronesis requires both perception AND the character to act.'},{q:"The Crito says never do wrong even when the system demands it. Isn't that unrealistically demanding?",a:"This is a genuinely important philosophical challenge and your group should engage it honestly. The Crito does not claim that maintaining moral integrity is easy ŌĆö Socrates is facing death and still holds to it. The principle describes what moral integrity requires, not what most people will achieve under institutional pressure. Two points: first, the principle is aspirational in the sense of providing a clear moral standard, not an empirical prediction of behavior. Second ŌĆö and crucially ŌĆö documented history shows that some individuals did request transfers, did refuse specific procedures, or later provided testimony against the program. The fact that some people managed refusal under identical institutional conditions demonstrates that it was achievable, even if rare and costly. The Crito's force is in establishing that the possibility of ethical action existed.",tip:"The documented cases of refusal are your empirical rebuttal. The Crito establishes what was possible; documented refusals show it was actually possible."},{q:"The U.S. didn't commit the experiments. Is it fair to hold them to the same moral responsibility?",a:"The U.S. moral agency failure is distinct in kind from the perpetrators' failure ŌĆö no one is arguing for equivalence in severity. The distinction is between commission (conducting the experiments) and complicity (deliberately protecting perpetrators and benefiting from the results). What makes the U.S. a moral agent in this case is the deliberate choice to prioritize strategic benefit over the victims' right to justice ŌĆö a right that the U.S. was simultaneously affirming at Nuremberg. Using the rights-based framework: the victims had a right to justice that the U.S. actively chose to suppress without their consent, for the U.S.'s own strategic benefit. The moral failure is real, if categorically different from Ishii's.",tip:'The framing: "distinct in kind, not equivalent in magnitude." Acknowledge the difference, then explain what makes the U.S. still morally culpable.'},{q:"Are there any examples of people connected to Unit 731 who actually reached Kohlberg's Stage 6?",a:"Fully documented Stage 6 reasoning by Unit 731 personnel is rare in the historical record, partly because those who refused or resisted had little incentive to document their reasoning after the war. However: some researchers did request transfers or express recorded discomfort. One documented case involves Shir┼Ź Sat┼Ź, a junior researcher who provided post-war testimony against the program despite the risk to his social standing. More significantly, the Nuremberg tribunal itself embodied Stage 6 reasoning at the institutional level ŌĆö the deliberate construction of universal principles to govern conduct that no existing positive law had adequately addressed. The tragedy of Unit 731's post-war outcome is that Stage 6 reasoning governed the treatment of Nazi doctors but was suspended, by U.S. strategic choice, in Unit 731's case.",tip:"If you can't name a specific Unit 731 Stage 6 actor, shift to the institutional level. The Nuremberg tribunal as an embodiment of Stage 6 is a strong and defensible answer."}]}];function k(){let[e,t]=(0,o.useState)(0),[n,a]=(0,o.useState)(new Set),[r,i]=(0,o.useState)(new Set),s=x[e],u=x.reduce((e,t)=>e+t.questions.length,0),c=r.size;return(0,l.jsxs)("div",{children:[(0,l.jsxs)("div",{className:"mb-6 p-4 bg-[#1a1917] border border-[#3a3733] rounded-lg",children:[(0,l.jsxs)("div",{className:"flex justify-between items-center mb-2",children:[(0,l.jsx)("p",{className:"text-[#c9a84c] text-xs font-bold",style:{fontFamily:"system-ui, sans-serif"},children:"DEFENSE PREP ŌĆö ALL 3 PARTS"}),(0,l.jsxs)("span",{className:"text-xs text-[#9c9690]",style:{fontFamily:"system-ui, sans-serif"},children:["Mastered: ",c," / ",u]})]}),(0,l.jsx)("div",{className:"w-full h-1 bg-[#3a3733] rounded-full overflow-hidden",children:(0,l.jsx)("div",{className:"h-full bg-[#c9a84c] rounded-full transition-all duration-500",style:{width:`${u?c/u*100:0}%`}})}),(0,l.jsx)("p",{className:"text-[#9c9690] text-xs mt-2",style:{fontFamily:"system-ui,
