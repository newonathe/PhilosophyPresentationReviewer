ansitionStatus()},y="19.2.5"});var i={};i=a("dw37A");var o=a("bb5Bq"),s={};!function e(){if("u">typeof __REACT_DEVTOOLS_GLOBAL_HOOK__&&"function"==typeof __REACT_DEVTOOLS_GLOBAL_HOOK__.checkDCE)try{__REACT_DEVTOOLS_GLOBAL_HOOK__.checkDCE(e)}catch(e){console.error(e)}}(),s=a("74MqB");var o=(a("bb5Bq"),a("bb5Bq"));let u=[{num:1,title:"Title Slide",time:"~20 sec",color:"#c9a84c",tip:"Just introduce the topic. Don't rush. Let the title breathe.",script:`So the case that our group will be presenting today is Unit 731 \u{2014} a covert biological and chemical warfare research unit of the Imperial Japanese Army during World War II.

I'll be covering Part 1 \u{2014} what actually happened. The facts, the people involved, and what came after.

My groupmates will then get into why it was wrong, and what should have been done differently.`,keywords:["Unit 731","covert","biological warfare","Imperial Japanese Army","Part 1 — the facts"]},{num:2,title:"Origins & Establishment",time:"~70 sec",color:"#a0752a",tip:"This slide has 4 columns. Go left to right. Don't read the slide — just talk through each point like you're explaining it to a friend.",script:`To understand how Unit 731 came to exist, we need to understand the context of 1930s Japan.

In 1931, Japan invaded Manchuria \u{2014} a region in northern China. The invasion was triggered by a staged explosion on a railway line \u{2014} what's called the Mukden Incident. Japan used it as an excuse to take over the area. And Manchuria was important because it was isolated, far from international eyes, and gave Japan the perfect place to operate in secret.

The key figure here is Lt. Gen. Shir\u{14D} Ishii \u{2014} a trained microbiologist and military doctor. In the late 1920s, he had studied biological warfare programs in Europe. And he noticed something: the 1925 Geneva Protocol banned the use of biological weapons \u{2014} but it didn't ban developing them. There was no enforcement mechanism. So Ishii went back to Japan and basically told Army leadership \u{2014} this is an unregulated space, and we should take advantage of it. And they listened.

In 1936, Emperor Hirohito signed Imperial Decree No. 575 \u{2014} which officially authorized the unit. But publicly, it was called the "Epidemic Prevention and Water Purification Department" \u{2014} which sounds like a public health department. That name was the cover. The actual purpose was human experimentation for weapons development.

The facility they built is called the Pingfang Complex. It was massive, and it had all the facilities they needed. It had laboratories, autopsy rooms, a crematorium, a private airstrip, and a prison block that could hold around 400 people at a time. The design of the building itself tells you what it was really for.`,keywords:["1931 Manchuria","Mukden Incident","Lt. Gen. Shirō Ishii","1925 Geneva Protocol","Imperial Decree No. 575","Epidemic Prevention cover","Pingfang Complex","6 km²","400 subjects"]},{num:3,title:"Key Moral Agents",time:"~55 sec",color:"#1a3d6b",tip:"Four boxes on the slide. Mention all four. The US one is the surprising one — say it with intention.",script:`This case involves four distinct layers of moral agents — and my groupmates will analyze each one in depth. For now, I want to identify them factually.

First, Ishii and the commanding officers. These were trained scientists and doctors who made the decision to build a program around killing people in the name of research. They knew what they were doing.

Second, the 3,000 or so researchers and physicians who actually carried out the experiments. One thing to note is that many of them chose to be there. They were recruited from top universities and they wanted the posting for the career opportunities and research access. They designed the protocols, they ran the experiments, they recorded the data.

Third, the Japanese state \u{2014} the government. They gave the imperial authorization, they funded it, and they hid the budget inside broader military spending. This wasn't a rogue operation. It had state support the entire time.

And the fourth one which came after the war \u{2014} the United States government. The U.S. protected Unit 731's leaders from prosecution in exchange for their research data. And this happened at the same time the U.S. was prosecuting Nazi doctors at Nuremberg for the exact same kind of crimes.`,keywords:["Ishii + commanding officers","3,000+ researchers","voluntarily recruited","Japanese state + Imperial Decree","U.S. post-war immunity","Nuremberg contrast"]},{num:4,title:"The Experiments & The Maruta System",time:"~75 sec",color:"#8b2121",tip:"The maruta explanation is the most important part of this slide. Take your time on it. The experiment list can be quick.",script:`So what actually happened inside Pingfang?

The first thing to understand is the "Maruta System." Maruta is the Japanese word for "logs." That's what they called the human subjects \u{2014} logs. And this wasn't just casual slang. It was the official administrative term used in their documents and internal communication. The point was to strip the people in that facility of their human identity \u{2014} to make them feel like material, not persons. And that made it easier for researchers to do what they did without thinking of it as harming people.

The victims were primarily Chinese civilians and prisoners of war \u{2014} but also Soviet soldiers, Koreans, Mongolians, and in some documented cases, Allied prisoners. None of them consented. None were told what was being done to them. They were defined by their vulnerability \u{2014} where they were, who they were, what circumstances they were in.

The experiments themselves included deliberate infection with diseases like plague, cholera, anthrax, and typhoid \u{2014} injected, forced to inhale, or ingested \u{2014} to see how quickly people got sick and how the diseases spread.

They also performed vivisection \u{2014} surgery on conscious people without anesthesia \u{2014} to observe the body's responses in real time. Subjects were also exposed to extreme cold until their limbs froze. Others were placed in pressure chambers until blood vessels ruptured. And some were literally tied to stakes outside and exposed to shells containing biological and chemical agents.  In 1940, plague-infected fleas were dispersed by aircraft over Ningbo, China, triggering a civilian outbreak. In 1941, a similar operation targeted Changde, Hunan province. The program extended to a network of over sixty affiliated units across occupied China, Korea, and Southeast Asia — all operating under epidemic prevention cover.

These were not accidents. These were formal research protocols.`,keywords:['Maruta = "logs"',"official administrative term","Chinese POWs, Soviet soldiers, Koreans, Allied prisoners","no consent","plague/cholera/anthrax/typhoid infection","vivisection without anesthesia","frostbite/pressure chambers/field testing"]},{num:5,title:"The Moral Decisions",time:"~55 sec",color:"#8b5a2b",tip:"Decision 4 is the gut-punch. Pause before and after saying it. Let it land.",script:`Now I want to be clear about what the actual moral problem is \u{2014} because it matters for what my groupmates will analyze next.

There were four core decisions that define this case.

Decision one was Ishii's: to choose human experimentation over ethical alternatives. Other nations' military medical programs were developing vaccines, improving sanitation, doing disease prevention \u{2014} all without using human subjects. That option existed. It was known. Ishii's program chose a different path on purpose.

Decision two was the Army's and the government's: to approve and fund the program for over a decade. This wasn't a one-time mistake. It was a continuous choice, renewed again and again.

Decision three was the individual researchers': to show up, participate, and do the work \u{2014} many of them willingly.

And decision four \u{2014} the one that proves everyone involved knew exactly what this was \u{2014} in August 1945, when Japan surrendered, Ishii ordered the surviving subjects to be executed. The documents were burned. The facility was partially demolished. They tried to erase everything.

That act of destruction \u{2014} that's the moment of clarity. Because you only destroy evidence when you know what you've done is wrong.`,keywords:["Decision 1: Ishii chose experimentation over alternatives","Decision 2: Army sustained it for a decade","Decision 3: researchers participated voluntarily","Decision 4: August 1945 — executed survivors, burned records"]},{num:6,title:"Outcomes & Consequences",time:"~55 sec",color:"#1a5c4a",tip:"The Nuremberg comparison is your strongest point on this slide. Deliver it slowly. The contrast is the point.",script:`So what came of all this?

In terms of direct casualties \u{2014} about 3,000 deaths are documented from within the Pingfang complex itself. But when you include the biological weapons deployments across the wider network \u{2014} the 60+ affiliated units, the plague attacks on Chinese cities \u{2014} the estimates go up to 300,000 or more. We can't know the exact number because the records were deliberately destroyed.

After the war, the Soviet Union did put 12 captured Unit 731 members on trial \u{2014} the Khabarovsk Trials in 1949. All 12 were convicted and sent to labor camps. But the West \u{2014} especially the U.S. \u{2014} publicly dismissed those trials as Cold War propaganda. And they did that because the U.S. had already made a deal.

American investigators had assessed Unit 731's research and decided it was too valuable to hand over or risk losing in a public trial. So General MacArthur approved a secret immunity arrangement \u{2014} full protection from prosecution, in exchange for complete access to the data. That data went to the U.S. Army program at Fort Detrick, Maryland. Shir\u{14D} Ishii then died in 1959 as a free man.

Ironically, that same U.S. government, in those same years, executed seven Nazi doctors at Nuremberg for running experiments of the exact same kind. Hypothermia. Pressure chambers. Deliberate infection. The same crimes. Different outcome. The difference wasn't the evidence. It was a strategic choice.`,keywords:["~3,000 lab deaths","300,000+ including field ops","1949 Khabarovsk Trials","USSR convicted 12","U.S. dismissed as propaganda","MacArthur immunity deal","data → Fort Detrick","Ishii died free 1959","Nuremberg: 7 Nazi doctors executed for same crimes"]},{num:7,title:"Handoff to Part 2",time:"~15 sec",color:"#534AB7",tip:"Clean, confident, make eye contact with your groupmate. Don't trail off.",script:`Those are the facts of the case.

ng else follows."]})]}),(0,i.jsx)("div",{style:{display:"flex",flexDirection:"column",gap:8},children:d.map(n=>(0,i.jsxs)("div",{style:{border:`1px solid ${e===n.id?n.color:"#2a2824"}`,borderRadius:8,overflow:"hidden",background:"#1a1917",transition:"border-color 0.2s"},children:[(0,i.jsxs)("button",{onClick:()=>t(e===n.id?null:n.id),style:{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"},children:[(0,i.jsx)("div",{style:{width:10,height:10,borderRadius:"50%",background:n.color,flexShrink:0}}),(0,i.jsxs)("div",{style:{flex:1},children:[(0,i.jsx)("div",{style:{fontSize:11,color:n.color,fontFamily:"system-ui, sans-serif",fontWeight:700,letterSpacing:"0.08em"},children:n.label}),(0,i.jsx)("div",{style:{fontSize:13,color:"#f0ece4",fontFamily:"system-ui, sans-serif"},children:n.time})]}),(0,i.jsx)("div",{style:{color:"#6b6560",fontSize:12},children:e===n.id?"▲":"▼"})]}),e===n.id&&(0,i.jsxs)("div",{style:{padding:"0 16px 16px",borderTop:"1px solid #2a2824"},children:[(0,i.jsx)("p",{style:{fontSize:13,color:"#9c9690",fontFamily:"Georgia, serif",margin:"12px 0",lineHeight:1.7},children:n.desc}),n.isRest&&(0,i.jsx)("div",{style:{background:"#1a1535",border:"1px solid #534AB7",borderRadius:6,padding:"10px 14px"},children:(0,i.jsxs)("p",{style:{fontSize:13,color:"#AFA9EC",fontFamily:"system-ui, sans-serif"},children:["Set alarm for ",(0,i.jsx)("strong",{children:"8:30 AM"}),". Set a backup for ",(0,i.jsx)("strong",{children:"8:45 AM"}),". Put your phone across the room."]})}),n.tasks.map((e,t)=>(0,i.jsxs)("div",{style:{marginTop:10,background:"#141312",borderRadius:6,padding:"10px 14px",border:"1px solid #2a2824"},children:[(0,i.jsxs)("div",{style:{display:"flex",gap:8,alignItems:"baseline",marginBottom:4},children:[(0,i.jsx)("span",{style:{fontSize:10,color:"#6b6560",fontFamily:"system-ui, sans-serif",flexShrink:0},children:e.t}),(0,i.jsx)("span",{style:{fontSize:13,color:"#f0e ions (Core Moral Problem)",points:["Decision 1 — Ishii: chose human experimentation when ethical alternatives (vaccines, disease prevention) existed.","Decision 2 — Army/State: sustained the program for 10+ years continuously.","Decision 3 — Researchers: participated voluntarily as scientific professionals.","Decision 4 — August 1945: Ishii ordered surviving subjects executed, documents burned, facility demolished. This proves they knew it was wrong."]},{title:"The Aftermath (Outcomes)",points:["~3,000 documented lab deaths at Pingfang. Up to 300,000+ including field bio weapons operations (contested — records were burned).","1949 Khabarovsk Trials: USSR convicted 12 captured personnel. West dismissed it as propaganda.","U.S. immunity deal: MacArthur approved immunity for Ishii's group; data transferred to Fort Detrick. Ishii died free in 1959.","Nuremberg comparison: same years, same crimes, 7 Nazi doctors executed. Unit 731 leaders: zero prosecutions."]}]},{id:"p2",label:"Part 2 — Sab's Part",sublabel:"Ethical Analysis",color:"#1D9E75",summary:"Sab explains WHY it was wrong using 5 ethical frameworks. You might get called on these.",sections:[{title:"Framework 1: Consequentialism / Utilitarianism",points:["Key question: Do the ends justify the means?","The means: Thousands died in extreme suffering. Unrecorded victims. Vivisection, disease exposure.",'The ends: The "benefit" was military power — not human wellbeing or medical advancement.',"Utilitarian verdict: Greatest good for the greatest number was NOT achieved. A minority (military) benefited at the cost of a majority (victims).","Conclusion: The decision fails on its own utilitarian terms."]},{title:"Framework 2: Deontology (Kant)",points:["Kant's 3 formulations of the Categorical Imperative:","(1) Universal Law: Would it work if everyone did it? If human experimentation were universalized — moral society collapses. The rule defeats itself.","(2) Humanity Formula: Always treat humanity as an END, never merely as a MEANS. Unit 731 used people as tools. No consent, no autonomy, no recognition of personhood.","(3) Kingdom of Ends: Act as if you're both the ruler and follower of your own moral laws. You can't impose laws on others you'd reject for yourself.","Conclusion: Violates all three formulations. Reduces humans to instruments."]},{title:"Framework 3: Rights-Based Ethics",points:["All humans have inherent rights: right to life, liberty, and dignity.","These rights exist REGARDLESS of law, wartime status, prisoner status, or nationality.","Unit 731: stripped all fundamental rights, denied autonomy and protection, eliminated consent and justice.","Conclusion: The rights weren't created by law — they were pre-existing. Violating them is wrong regardless of what the law says at the time."]},{title:"Framework 4: Virtue Ethics (Aristotle)",points:["Character is built through repeated action. What you repeatedly do becomes who you are.","Unit 731 didn't happen overnight — it required systemic support built over time.","Researchers lacked phronesis (practical wisdom): the ability to perceive that something is morally wrong AND act on that perception.","Their environment trained them toward compliance, not moral discernment.","Conclusion: Reflects a cultivated disposition toward cruelty — a corruption of character at both individual and institutional levels."]},{title:"Framework 5: Kohlberg's Moral Development",points:["Stage 4 (where researchers were): conventional morality. Follow institutional rules, defer to authority, fulfill role expectations.","Stages 5 & 6 (post-conventional): recognize that universal ethical principles override institutional commands.","The researchers never reached Stages 5 or 6.","Core failure: Not ignorance of right and wrong — but arrested moral development. Obedience felt like enough.","Natural Law connection: Aquinas says humans naturally incline toward preserving life, seeking truth, and living in harmony. Unit 731 violated all three."]}]},{id:"p3",label:"Part 3 — Mateo's Part",sublabel:"Moral Insight / What Should Have Been Done",color:"#534AB7",summary:"Mateo answers: what SHOULD each moral agent have done? And why is that the ethical choice?",sections:[{title:"Ishii & Officers: Should have refused",points:["Ethical alternative: Defensive medical research — vaccines, disease prevention, field sanitation. Same military objective, no human experimentation.","This wasn't hypothetical — other nations' military medical corps were doing exactly this.","Kohlberg: Ishii operated at Stage 2 (instrumental self-interest — career, funding). Post-conventional reasoning (Stages 5–6) would recognize no career overrides human dignity.","The cost of doing the right thing doesn't change that it was right."]},{title:"The Researchers: Should have refused",points:["Concretely: refuse procedures on living subjects, report through available channels, or document for future accountability.","They were young physicians at an already-running institution — social pressure was enormous. Military hierarchy, peer behavior, maruta language.","Kohlberg: stuck at Stage 4 — follow the rules, defer to authority.","What was needed: phronesis (Aristotle) + moral courage. Not just perceiving the wrong, but having the character to act against it.","Crito principle: Never do wrong, even when the system demands it."]},{title:"Japanese State: Should have built ethical institutions",points:["Alternatives: Independent ethical oversight of military research, separation of military command from medical practice, legal protections for human subjects.","Aquinas's third secondary precept: Society must be well-ordered for human flourishing. The state's function is to create conditions for people to pursue natural ends — not to use them as raw material.","A state that does the latter has corrupted its own purpose."]},{title:"U.S. Government: Should have prosecuted",points:["Surface-level utilitarian case for immunity: the data might protect future lives. This is a genuine moral tension.","Why prosecution was still right: The utilitarian case collapses because the precedent is catastrophic. If atrocities are forgivable when results are useful, you create an incentive to commit them.","The deal treated victims' suffering as a resource to be harvested — trading their pain for their torturers' freedom, without victims' consent.","Nuremberg showed prosecution was possible. The U.S. chose strategic advantage over justice."]},{title:"The Deeper Lesson",points:["Evil is not done only by evil people. It's done by educated professionals whose moral reasoning stays at the conventional level.","Every framework from this course provides tools to prevent this: Natural Law (preserve life), Kant (never use a person merely as a means), Aristotle (develop character to act rightly when it costs), Kohlberg (moral maturity = move beyond obedience to universal principles).","The moral agents had access to these ideas. What they lacked was the development to act on them."]}]}];function h(){let[e,t]=(0,o.useState)("p1"),[n,r]=(0,o.useState)(0),a=p.find(t=>t.id===e);return(0,i.jsxs)("div",{children:[(0,i.jsx)("div",{style:{marginBottom:16,padding:"10px 14px",background:"#1a1917",borderRadius:8,border:"1px solid #2a2824"},children:(0,i.jsx)("p",{style:{fontSize:13,color:"#9c9690",fontFamily:"Georgia, serif",lineHeight:1.7,margin:0},children:"You might get called on any part. This is your crash course for all three. Read the one you're least sure about most carefully."})}),(0,i.jsx)("div",{style:{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"},children:p.map(n=>(0,i.jsxs)("button",{onClick:()=>{t(n.id),r(0)},style:{padding:"8px 14px",borderRadius:6,border:`1px solid ${e===n.id?n.color:"#2a2824"}`,background:e===n.id?n.color+"22":"transparent",color:e===n.id?n.color:"#9c9690",fontFamily:"system-ui, sans-serif",fontSize:12,cursor:"pointer",fontWeight:e===n.id?700:400,textAlign:"left"},children:[(0,i.jsx)("div",{children:n.label}),(0,i. ntity. Soldiers killed people. These people were doing research on them.",hot:!0},{q:"How certain are the death figures? Why is there such a wide range?",a:"The 3,000 figure comes from documented deaths at Pingfang specifically — from post-war testimony and the records that survived. The broader estimates (up to 300,000+) include field biological weapons operations, the 60+ affiliated units, and indirect casualties from engineered disease outbreaks across China. We can't be precise because Ishii ordered the records destroyed in 1945. The wide range is itself a consequence of the cover-up.",hot:!1},{q:"Why did the U.S. grant immunity instead of prosecuting?",a:"American investigators assessed the biological warfare data as militarily unique — derived from human subjects and not replicable ethically. With the Cold War starting, they didn't want the Soviets to access it through a public trial. So MacArthur approved immunity in exchange for the data. The irony is they were prosecuting Nazi doctors at Nuremberg at the same time for the exact same category of crime.",hot:!1},{q:"Did the unit do any legitimate public health work?",a:"The broader network of units did some genuine epidemic prevention for Japanese troops — water sanitation, disease surveillance. But the Pingfang facility itself was exclusively for weapons development and human experimentation. The public health name was institutional cover, not an actual secondary mission.",hot:!1},{q:"What happened to Ishii after the war?",a:"He cooperated fully with American investigators, gave them the data, and was granted full immunity. He lived freely in Japan, gave at least one documented lecture to U.S. military researchers in the 1950s on the unit's findings, and died of throat cancer in 1959 at age 67. Never prosecuted.",hot:!1}]},{label:"Part 2 — Sab's Section",color:"#1D9E75",qas:[{q:"Under utilitarianism, couldn't you argue the data saved more lives?",a:'Two reasons it collapses. First, empirically: the data was largely assessed as methodologically flawed — poor controls, limited real utility. No major breakthrough was documented. Second, rule utilitarian: if you permit institutions to sacrifice non-consenting individuals for "greater good," you destroy social trust in medicine globally. The indirect long-term costs dwarf any claimed benefit.',hot:!0},{q:"Kant says to universalize your maxims. Couldn't a researcher argue they had a duty to protect Japan?",a:'No. Universalizability requires the maxim to work for ALL rational agents, not just members of one nation. The maxim "researchers may kill non-consenting subjects from enemy nations to advance national power" self-destructs when universalized — no one would be safe from any state\'s research agenda. It fails the universal law formula.',hot:!1},{q:"Rights-based ethics says rights exist regardless of law. But there was no law against this in 1940.",a:"That's exactly the point of rights-based ethics. Rights are pre-legal — they exist and are morally binding whether or not law recognizes them. The Nuremberg Code didn't create these rights in 1947. It recognized rights that already existed. The absence of codification doesn't mean the moral obligation was absent.",hot:!1},{q:"Virtue ethics is about individuals. How does it apply to an institution?",a:"Institutions shape individual character through reward structures, language, norms, and hierarchy. Unit 731's design — the maruta classification, prohibition on learning subjects' names, peer culture — actively cultivated vices. The institution is culpable not as a moral agent itself, but as a structure that systematically prevented the development of moral character in its members.",hot:!1},{q:"What's the difference between Kohlberg Stage 4 and Stage 5?",a:'Stage 4: you follow institutional rules because they are the rules. You don\'t question whether the rules are just. Stage 5: you evaluate rules against universal principles — you ask whether the rule is morally legitimate, not just whether it exists. The researchers were at Stage 4 because they accepted the institutional framing as sufficient moral justification without ever asking "is this system actually right?"',hot:!1}]},{label:"Part 3 — Mateo's Section",color:"#534AB7",qas:[{q:"What should Ishii have done instead?",a:"Refused to establish the program. The ethical alternative existed and was known: defensive medical research — vaccines, disease prevention, field sanitation — serving the same stated military objective without human experimentation. Other nations' military medical programs were doing exactly this. Ishii chose the other path because it was faster and because no one above him would stop him.",hot:!1},{q:"Is it realistic to expect young researchers to have refused?",a:"The Crito principle says yes — never do wrong even when the system demands it, even at personal cost. It's not that it would have been easy. The point is that it was possible. Documented cases exist of individuals requesting transfers or expressing refusal. The fact that some people managed it under the same conditions means refusal was achievable, even if rare.",hot:!0},{q:"The U.S. immunity deal — was there a legitimate argument for it?",a:"Yes, there's a surface-level utilitarian case: if the data saves future lives, immunity maximizes good. Mateo acknowledges this as a genuine moral tension. But the counterargument is stronger: if atrocities are forgivable when results are useful, you create an incentive to commit them. And the deal treated victims' suffering as a resource — their pain traded for their torturers' freedom — without the victims' consent.",hot:!1},{q:"What is phronesis and why does it matter here?",a:"Phronesis is Aristotle's concept of practical wisdom — the trained ability to perceive a moral situation correctly and act on that perception with courage. It's not the same as intelligence or education. The researchers had the intellectual capacity to see what was happening. What they lacked was the habituated character to act against the institution on the basis of that perception. Phronesis requires both perception AND the moral courage to act.",hot:!1},{q:"What's the deepest lesson from this case?",a:"That evil is not only done by evil people. It's done by educated professionals whose moral reasoning stays at the conventional level — who follow orders without questioning, who treat their role as permission to stop thinking. Every ethical framework from this course provides the tools to prevent this. The moral agents had access to these ideas. What they lacked was the development to act on them.",hot:!0}]}];function g(){let[e,t]=(0,o.useState)(0),[n,r]=(0,o.useState)(new Set),[a,l]=(0,o.useState)(new Set),s=m[e],u=m.flatMap((e,t)=>e.qas.map((e,n)=>`${t}-${n}`)),c=u.length?Math.round(a.size/u.length*100):0;function d(e,t,n){let r=new Set(e);r.has(t)?r.delete(t):r.add(t),n(r)}return(0,i.jsxs)("div",{children:[(0,i.jsxs)("div",{style:{marginBottom:16},children:[(0,i.jsxs)("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4},children:[(0,i.jsx)("span",{style:{fontSize:11,color:"#9c9690",fontFamily:"system-ui, sans-serif"},children:"Questions mastered"}),(0,i.jsxs)("span",{style:{fontSize:11,color:"#c9a84c",fontFamily:"system-ui, sans-serif",fontWeight:700},children:[a.size," / ",u.length]})]}),(0,i.jsx)("div",{style:{height:4,background:"#2a2824",borderRadius:2,overflow:"hidden"},children:(0,i.jsx)("div",{style:{height:"100%",background:"#c9a84c",borderRadius:2,width:`${c}%`,transition:"width 0.4s ease"}})})]}),(0,i.jsx)("div",{style:{padding:"10px 14px",background:"#0d1f18",border:"1px solid #1D9E75",borderRadius:8,marginBottom:16},children:(0,i.jsxs)("p",{style:{fontSize:12,color:"#1D9E75",fontFamily:"system-ui, sans-serif",margin:0},children:[(0,i.jsx)("strong",{children:"How to use this:"})," Click a question. Try to answer in your head. Then reveal. If you got the gist — mark it mastered. Focus on the 🔥 hot questions first.
