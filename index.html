time:"2:45–3:00",task:"Close the script. Say Slide 4 (Maruta) from memory.",detail:'Maruta = "logs," official term, not slang → victims defined by vulnerability → infection/vivisection/frostbite/pressure/field testing → Ningbo 1940, Changde 1941 → 60+ units. This is the slide with the most detail. Say it rough — rough is fine.'},{time:"3:00–3:10",task:"Say Slide 5 (Moral Decisions) from memory",detail:"Decision 1 (Ishii: chose experimentation over alternatives) → Decision 2 (Army: sustained it a decade) → Decision 3 (researchers: participated voluntarily) → Decision 4 (August 1945: destroyed evidence, executed survivors). That 4th one is your gut-punch. Pause before and after it."},{time:"3:10–3:15",task:"Run the full script one more time — no stopping",detail:"All slides, 1 through 7. Don't stop if you blank. Keep moving. Your goal is the flow, not perfection."}]},{id:"block2",badge:"3:15 – 4:00 PM",color:"#1a5c4a",title:"Second block — Parts 2 & 3 (45 min)",desc:"You might get called on any part. This is your insurance window.",tasks:[{time:"3:15–3:35",task:"Read Part 2 crash course (Sab)",detail:"5 frameworks: Consequentialism (ends don't justify means), Kant (3 formulations), Rights-Based (inherent rights pre-law), Virtue Ethics (phronesis + character), Kohlberg (Stage 4 vs 5/6). Read through the Crash Course tab — don't memorize, just track the logic of each framework."},{time:"3:35–3:50",task:"Read Part 3 crash course (Mateo)",detail:"4 moral agents: Ishii (should have refused — Stage 2 vs Stage 5/6), Researchers (should have refused — Crito principle, phronesis + courage), Japanese State (Aquinas — society must protect, not exploit), U.S. (should have prosecuted — utilitarian case collapses, victims treated as resource). Conclusion: Antigone + Socrates as examples of acting on principle despite cost."},{time:"3:50–4:00",task:"Do the 3 hot-marked defense questions",detail:"Open the Defense tab. Answer the 3 🔥 questions out loud. Just talk through them. You don't need perfect answers — you need the core idea."}]},{id:"rest",badge:"4:00 – 4:30 PM",color:"#534AB7",title:"Mandatory break (30 min)",desc:"Non-negotiable. Your brain on 4 hours of sleep cannot retain new information without a rest interval. This is the science of how memory consolidation works. If you keep reading, the last 2 hours won't stick.",tasks:[{time:"4:00–4:30",task:"Step away completely",detail:"Walk outside if you can. Sit somewhere that isn't your study spot. Close your eyes for 10 minutes if possible — even without sleeping, eye closure with slow breathing reduces cortisol and lets your brain process what you just learned. Don't scroll your phone. Don't look at the slides. Just exist for 30 minutes."}]},{id:"block3",badge:"4:30 – 5:00 PM",color:"#b8943a",title:"Third block — consolidation (30 min)",desc:"Final focused window before your org meeting. This is review, not new learning.",tasks:[{time:"4:30–4:45",task:"Say the whole script again — all 7 slides",detail:"One more full run. You'll notice it comes out smoother than before. That's the rest interval working. Don't be surprised if you remember more than you expect."},{time:"4:45–5:00",task:"Read all 15 defense Q&As once",detail:"All three sections. Just read them — questions and answers. You're priming your brain to recognize the patterns so that if a question comes, you have the framework to respond even if you can't remember the exact wording."}]},{id:"meeting",badge:"5:00 – 6:00 PM",color:"#6b6359",title:"Org meeting — shallow study mode",desc:"You're in the meeting. Don't ignore it completely, but use small pockets.",tasks:[{time:"During meeting",task:"Keep the Defense tab open on your phone",detail:"When there's downtime, read one Q&A. Don't try to absorb everything — just keep the material slightly active in your mind. Even passive re-exposure helps."},{time:"During meeting",task:"One quiet script pass in your head",detail:"While someone else is talking: mentally walk through your slides. No paper needed. Origins → Agents → Experiments → Decisions → Outcomes. Just the headlines in order."}]},{id:"final",badge:"6:00 – 6:25 PM",color:"#c0392b",title:"Final window — do NOT study new things",desc:"This is the most important instruction for this block: stop learning. Your job now is to stabilize, not add.",tasks:[{time:"6:00–6:10",task:"Find your groupmates and go through the handoffs",detail:"Know exactly when you end and when Sab starts. Know Sab's first line. Know Mateo's first line after Sab. Clean handoffs read as teamwork to the evaluator."},{time:"6:10–6:20",task:"Walk through your slides visually one time",detail:"Just look at each slide and say one or two sentences about it. No script. You're confirming that the material is accessible — which it is."},{time:"6:20–6:30",task:"Stop. Breathe. Don't cram.",detail:"Cramming in the last 10 minutes increases anxiety and activates the amygdala, which competes with the prefrontal cortex — literally making it harder to recall information. You have done the work. Let it sit. The question isn't whether you know this — you do. The question is whether you're calm enough to access it."}]},{id:"present",badge:"6:30 PM",color:"#1a5c4a",title:"Present",desc:"If you blank on a word — paraphrase. The slide heading tells you what to say. Origins → 1931 and Ishii. Experiments → Maruta and what they did. The slides are your safety net.",tasks:[{time:"If you blank",task:"Paraphrase, don't freeze",detail:"You don't need the exact words. If you lose a sentence, say what you know about that slide in plain English. The audience doesn't have your script."},{time:"If asked a defense question",task:"Think out loud for 2 seconds",detail:'A 2-second pause before answering reads as thoughtfulness, not ignorance. "That\'s something we considered..." then say what you know. You have done the prep.'}]}];function c(){let[e,t]=(0,l.useState)("now");return(0,o.jsxs)("div",{children:[(0,o.jsxs)("div",{style:{marginBottom:16,padding:"12px 16px",background:"#1a1917",borderRadius:8,border:"1px solid #b8943a"},children:[(0,o.jsx)("div",{style:{fontSize:11,color:"#b8943a",fontFamily:"system-ui",fontWeight:700,letterSpacing:"0.1em",marginBottom:4},children:"YOUR SITUATION AT 2:00 PM"}),(0,o.jsxs)("div",{style:{fontSize:13,color:"#c8c0b4",fontFamily:"Georgia",lineHeight:1.75},children:["4.5 hours until presentation. Org meeting eats one of those. You have ",(0,o.jsx)("strong",{style:{color:"#f0ece4"},children:"3 real study hours"})," plus shallow review during the meeting. That is enough — if you use it right. The plan below is hour-by-hour. Start at the top."]})]}),(0,o.jsx)("div",{style:{display:"flex",flexDirection:"column",gap:8},children:u.map(n=>(0,o.jsxs)("div",{style:{border:`1px solid ${e===n.id?n.color:"#252320"}`,borderRadius:8,overflow:"hidden",background:"#161514",transition:"border-color 0.2s"},children:[(0,o.jsxs)("button",{onClick:()=>t(e===n.id?null:n.id),style:{width:"100%",display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"},children:[(0,o.jsx)("div",{style:{width:8,height:8,borderRadius:"50%",background:n.color,marginTop:5,flexShrink:0}}),(0,o.jsxs)("div",{style:{flex:1},children:[(0,o.jsx)("div",{style:{fontSize:10,color:n.color,fontFamily:"system-ui",fontWeight:700,letterSpacing:"0.08em",marginBottom:2},children:n.badge}),(0,o.jsx)("div",{style:{fontSize:14,color:"#f0ece4",fontFamily:"system-ui",fontWeight:600},children:n.title})]}),(0,o.jsx)("span",{style:{color:"#4a4845",fontSize:12,marginTop:2},children:e===n.id?"▲":"▼"})]}),e===n.id&&(0,o.jsxs)("div",{style:{padding:"0 16px 16px",borderTop:"1px solid #252320"},children:[(0,o.jsx)("p",{style:{fontSize:13,color:"#8a8278",fontFamily:"Georgia",margin:"12px 0",lineHeight:1.75},children:n.desc}),n.tasks.map((e,t)=>(0,o.jsxs)("div",{style:{marginTop:8,background:"#0f0e0d",borderRadius:6,padding:"10px 14px",border:"1px solid #252320"},children:[(0,o.jsxs)("div",{style:{display:"flex",gap:8,alignItems:"baseline",marginBottom:4,flexWrap:"wrap"},children:[(0,o.jsx)("span",{style:{fontSize:10,color:"#534AB7",fontFamily:"system-ui",flexShrink:0,fontWeight:600},children:e.time}),(0,o.jsx)("span",{style:{fontSize:13,color:"#f0ece4",fontWeight:600,fontFamily:"system-ui"},children:e.task})]}),(0,o.jsx)("p",{style:{fontSize:12,color:"#8a8278",fontFamily:"Georgia",lineHeight:1.65,margin:0},children:e.detail})]},t))]})]},n.id))})]})}var l=a("bb5Bq");let d=[{num:1,title:"Title Slide",time:"~20 sec",color:"#b8943a",tip:"Don't rush. Let the title sit for a second. Take one breath before you speak.",script:`So the case that our group will be presenting today is Unit 731 \u{2014} a covert biological and chemical warfare research unit of the Imperial Japanese Army during World War II.

I'll be covering Part 1 \u{2014} what actually happened. The facts, the people involved, and what came after.

My groupmates will then get into why it was wrong, and what should have been done differently.`,keywords:["Unit 731","covert","biological warfare","Imperial Japanese Army","Part 1 — the facts"],anchor:"Introduce the case. Set up the structure. Three sentences."},{num:2,title:"Origins & Establishment",time:"~70 sec",color:"#a0752a",tip:"4 columns on the slide. Go left to right. Each column = one thing you say. Don't try to say everything — hit the key phrase for each.",script:`To understand how Unit 731 came to exist, we need to understand the context of 1930s Japan.

In 1931, Japan invaded Manchuria \u{2014} a region in northern China. The invasion was triggered by a staged explosion on a railway line \u{2014} what's called the Mukden Incident. Japan used it as an excuse to take over the area. And Manchuria was important because it was isolated, far from international eyes, and gave Japan the perfect place to operate in secret.

The key figure here is Lt. Gen. Shir\u{14D} Ishii \u{2014} a trained microbiologist and military doctor. In the late 1920s, he had studied biological warfare programs in Europe. And he noticed something: the 1925 Geneva Protocol banned the use of biological weapons \u{2014} but it didn't ban developing them. There was no enforcement mechanism. So Ishii went back to Japan and basically told Army leadership \u{2014} this is an unregulated space, and we should take advantage of it. And they listened.

In 1936, Emperor Hirohito signed Imperial Decree No. 575 \u{2014} which officially authorized the unit. But publicly, it was called the "Epidemic Prevention and Water Purification Department" \u{2014} which sounds like a public health department. That name was the cover. The actual purpose was human experimentation for weapons development.

The facility they built is called the Pingfang Complex. It was massive, and it had all the facilities they needed \u{2014} laboratories, autopsy rooms, a crematorium, a private airstrip, and a prison block that could hold around 400 people at a time. The design of the building itself tells you what it was really for.`,keywords:["1931 Manchuria","Mukden Incident","Shirō Ishii","Geneva Protocol gap","Imperial Decree No. 575",'"Epidemic Prevention" cover name',"Pingfang Complex","400 prison capacity","crematorium + airstrip"],anchor:"Context → Ishii → 1936 Decree → Pingfang. Four beats."},{num:3,title:"Key Moral Agents",time:"~55 sec",color:"#1a3d6b",tip:'4 boxes on the slide. Say one thing about each. The U.S. bullet is the surprising one — say it with intention and plant the thread: "I\'ll come back to this."',script:`This case involves four distinct layers of moral agents \u{2014} and my groupmates will analyze each one in depth. For now, I want to identify them factually.

First, Ishii and the commanding officers. These were trained scientists and doctors who made the decision to build a program around killing people in the name of research. They knew what they were doing.

Second, the 3,000 or so researchers and physicians who actually carried out the experiments. One thing to note is that many of them chose to be there. They were recruited from top universities and they wanted the posting for the career opportunities and research access. They designed the protocols, they ran the experiments, they recorded the data.

Third, the Japanese state \u{2014} the government. They gave the imperial authorization, they funded it, and they hid the budget inside broader military spending. This wasn't a rogue operation. It had state support the entire time.

And the fourth one which came after the war \u{2014} the United States government. The U.S. protected Unit 731's leaders from prosecution in exchange for their research data. And this happened at the same time the U.S. was prosecuting Nazi doctors at Nuremberg for the exact same kind of crimes.`,keywords:["Ishii + officers","3,000+ researchers","voluntarily sought posting","Japanese state authorization","budget hidden in military spending","U.S. immunity for data","Nuremberg contrast"],anchor:"Four agents. One sentence each. The U.S. one plants a thread."},{num:4,title:"The Experiments & The Maruta System",time:"~75 sec",color:"#8b2121",tip:"Maruta is the conceptual anchor of this entire slide. Take your time on it. The experiment list can be paced quickly after. Don't editorialize — stay factual.",script:`So what actually happened inside Pingfang?

The first thing to understand is the "Maruta System." Maruta is the Japanese word for "logs." That's what they called the human subjects \u{2014} logs. And this wasn't just casual slang. It was the official administrative term used in their documents and internal communication. The point was to strip the people in that facility of their human identity \u{2014} to make them feel like material, not persons. And that made it easier for researchers to do what they did without thinking of it as harming people.

The victims were primarily Chinese civilians and prisoners of war \u{2014} but also Soviet soldiers, Koreans, Mongolians, and in some documented cases, Allied prisoners. None of them consented. None were told what was being done to them. They were defined by their vulnerability \u{2014} where they were, who they were, what circumstances they were in.

The experiments themselves included deliberate infection with diseases like plague, cholera, anthrax, and typhoid \u{2014} injected, forced to inhale, or ingested \u{2014} to see how quickly people got sick and how the diseases spread.

They also performed vivisection \u{2014} surgery on conscious people without anesthesia \u{2014} to observe the body's responses in real time. Subjects were also exposed to extreme cold until their limbs froze. Others were placed in pressure chambers until blood vessels ruptured. And some were literally tied to stakes outside and exposed to shells containing biological and chemical agents.

In 1940, plague-infected fleas were dispersed by aircraft over Ningbo, China, triggering a civilian outbreak. In 1941, a similar operation targeted Changde, Hunan province. The program extended to a network of over sixty affiliated units across occupied China, Korea, and Southeast Asia \u{2014} all operating under epidemic prevention cover.

These were not accidents. These were formal research protocols.`,keywords:['Maruta = "logs"',"official admin term","Chinese POWs + Soviet soldiers + Koreans + Allied","no consent","plague/cholera/anthrax/typhoid","vivisection without anesthesia","frostbite / pressure chambers","Ningbo 1940 / Changde 1941","60+ affiliated units"],anchor:'Maruta explanation first, then experiments fast, then field deployment, close with "formal protocols."'},{num:5,title:"The Moral Decisions",time:"~55 sec",color:"#8b5a2b",tip:'Decision 4 is your gut-punch. Say it slowly. Let it land before you move on. Pause after "that\'s the moment of clarity."',script:`Now I want to be clear about what the actual moral problem is \u{2014} because it matters for what my groupmates will analyze next.

There were four core decisions that define this case.

Decision one was Ishii's: to choose human experimentation over ethical alternatives. Other nations' military medical programs were developing vaccines, improving sanitation, doing disease prevention \u{2014} all without using human subjects. That option existed. It was known. Ishii's program chose a different path on purpose.

Decision two was the Army's and the government's: to approve and fund the program for over a decade. This wasn't a one-time mistake. It was a continuous choice, renewed again and again.

Decision three was the individual researchers': to show up, participate, and do the work \u{2014} many of them willingly.

And decision four \u{2014} the one that proves everyone involved knew exactly what this was \u{2014} in August 1945, when Japan surrendered, Ishii ordered the surviving subjects to be executed. The documents were burned. The facility was partially demolished. They tried to erase everything.

That act of destruction \u{2014} that's the moment of clarity. Because you only destroy evidence when you know what you've done is wrong.`,keywords:["Decision 1: Ishii chose experimentation over alternatives","Decision 2: Army/state sustained it a decade","Decision 3: researchers participated voluntarily","Decision 4: August 1945 — executed survivors, burned records",'"you only destroy evidence when you know"'],anchor:"Four decisions. Decision 4 is the gut-punch. Pause after it."},{num:6,title:"Outcomes & Consequences",time:"~65 sec",color:"#1a5c4a",tip:"The Nuremberg comparison is the most powerful factual point you have. Deliver it plainly. Don't editorialize — let the contrast do the work.",script:`So what came of all this?

In terms of direct casualties \u{2014} about 3,000 deaths are documented from within the Pingfang complex itself. But when you include the biological weapons deployments across the wider network \u{2014} the 60+ affiliated units, the plague attacks on Chinese cities \u{2014} the estimates go up to 300,000 or more. We can't know the exact number because the records were deliberately destroyed.

After the war, the Soviet Union did put 12 captured Unit 731 members on trial \u{2014} the Khabarovsk Trials in 1949. All 12 were convicted and sent to labor camps. But the West \u{2014} especially the U.S. \u{2014} publicly dismissed those trials as Cold War propaganda. And they did that because the U.S. had already made a deal.

American investigators had assessed Unit 731's research and decided it was too valuable to hand over or risk losing in a public trial. So General MacArthur approved a secret immunity arrangement \u{2014} full protection from prosecution, in exchange for complete access to the data. That data went to the U.S. Army program at Fort Detrick, Maryland. Shir\u{14D} Ishii then died in 1959 as a free man.

Ironically, that same U.S. government, in those same years, executed seven Nazi doctors at Nuremberg for running experiments of the exact same kind. Hypothermia. Pressure chambers. Deliberate infection. The same crimes. Different outcome. The difference wasn't the evidence. It was a strategic choice.`,keywords:["~3,000 Pingfang deaths","300,000+ including field ops","1949 Khabarovsk Trials","12 convicted by USSR","MacArthur immunity deal","data → Fort Detrick","Ishii died free 1959","7 Nazi doctors executed at Nuremberg","same crimes different outcome"],anchor:"3,000 → Khabarovsk → immunity deal → Nuremberg contrast. Land the last line."},{num:7,title:"Handoff to Part 2",time:"~15 sec",color:"#534AB7",tip:"Clean and confident. Eye contact with Sab. Don't trail off.",script:`Those are the facts of the case.

My groupmate will now walk us through the ethical analysis \u{2014} looking at why, specifically, these decisions were wrong.`,keywords:["clean handoff","eye contact with Sab","confident close"],anchor:"Two sentences. Done."}];function f(){let[e,t]=(0,l.useState)(0),[n,r]=(0,l.useState)(!1);return(0,o.jsxs)("div",{children:[(0,o.jsxs)("div",{style:{marginBottom:16,padding:"12px 16px",background:"#161514",borderRadius:8,border:"1px solid #252320",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8},children:[(0,o.jsxs)("div",{style:{fontSize:13,color:"#8a8278",fontFamily:"Georgia",lineHeight:1.6},children:["Don't memorize. Read twice, then say it in your own words using the ",(0,o.jsx)("strong",{style:{color:"#f0ece4"},children:"anchor"})," at the bottom of each slide. Keywords = what you cannot miss."]}),(0,o.jsx)("button",{onClick:()=>r(!n),style:{fontSize:11,color:"#b8943a",background:"transparent",border:"1px solid #b8943a",borderRadius:4,padding:"3px 10px",cursor:"pointer",fontFamily:"system-ui",flexShrink:0},children:n?"Full script mode":"Keywords-only mode"})]}),(0,o.jsx)("div",{style:{display:"flex",flexDirection:"column",gap:8},children:d.map((r,a)=>(0,o.jsxs)("div",{style:{border:`1px solid ${e===a?r.color:"#252320"}`,borderRadius:8,overflow:"hidden",background:"#161514",transition:"border-color 0.2s"},children:[(0,o.jsxs)("button",{onClick:()=>t(e===a?null:a),style:{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"},children:[(0,o.jsx)("div",{style:{width:22,height:22,borderRadius:4,background:r.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:700,flexShrink:0,fontFamily:"system-ui"},children:r.num}),(0,o.jsx)("span",{style:{flex:1,fontSize:13,color:"#f0ece4",fontWeight:600,fontFamily:"system-ui"},children:r.title}),(0,o.jsx)("span",{style:{fontSize:11,color:"#534AB7",fontFamily:"system-ui",marginRight:8},children:r.time}),(0,o.jsx)("span",{style:{color:"#4a4845",fontSize:12},children:e===a?"▲":"▼"})]}),(e===a||n)&&(0,o.jsxs)("div",{style:{padding:"0 16px 14px",borderTop:"1px solid #252320"},children:[e===a&&!n&&(0,o.jsxs)(o.Fragment,{children:[(0,o.jsx)("div",{style:{margin:"10px 0",padding:"8px 12px",background:r.color+"18",borderLeft:`2px solid ${r.color}`,borderRadius:"0 4px 4px 0"},children:(0,o.jsxs)("span",{style:{fontSize:12,color:r.color,fontFamily:"system-ui",fontStyle:"italic"},children:["💡 ",r.tip]})}),(0,o.jsx)("div",{style:{fontSize:16,color:"#d4cfc8",lineHeight:1.95,fontFamily:"Georgia",whiteSpace:"pre-line",marginBottom:12},children:r.script})]}),(0,o.jsxs)("div",{style:{marginBottom:8},children:[(0,o.jsxs)("div",{style:{fontSize:10,color:"#534AB7",fontFamily:"system-ui",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5,fontWeight:700},children:["Anchor: ",r.anchor]}),(0,o.jsx)("div",{style:{display:"flex",flexWrap:"wrap",gap:5},children:r.keywords.map((e,t)=>(0,o.jsx)("span",{style:{fontSize:11,padding:"2px 7px",borderRadius:10,background:r.color+"22",color:r.color,fontFamily:"system-ui"},children:e},t))})]})]})]},a))}),(0,o.jsxs)("div",{style:{marginTop:16,padding:"12px 16px",background:"#0d1a14",border:"1px solid #1a5c4a",borderRadius:8},children:[(0,o.jsx)("div",{style:{fontSize:11,color:"#1a5c4a",fontFamily:"system-ui",fontWeight:700,letterSpacing:"0.1em",marginBottom:5},children:"IF YOU BLANK DURING THE PRESENTATION"}),(0,o.jsx)("div",{style:{fontSize:13,color:"#8a8278",fontFamily:"Georgia",lineHeight:1.75},children:"Look at the slide heading. It tells you what to say. Origins → say 1931 and Ishii. Experiments → say maruta and what they did. Outcomes → say 3,000 / Khabarovsk / immunity deal / Nuremberg. The slides are your safety net."})]})]})}var l=a("bb5Bq");let h=[{id:"p1",label:"Part 1 — Yours (Ethan)",color:"#b8943a",sublabel:"Relevant Factors",tagline:"WHAT HAPPENED. Neutral facts. No ethical judgment.",sections:[{title:"Origins & Establishment",pts:["1931: Mukden Incident — staged explosion used as pretext to invade Manchuria. Isolated, unmonitored territory = perfect secrecy.","Shirō Ishii — trained microbiologist — observes that the 1925 Geneva Protocol banned USE but not DEVELOPMENT of bio weapons. No verification mechanism. He pitches this gap to Army leadership.",'1936: Imperial Decree No. 575 by Emperor Hirohito. Official name: "Epidemic Prevention and Water Purification Department" — public health cover. Actual mandate: human experimentation for weapons.',"Pingfang Complex: 6 km², labs, autopsy rooms, crematorium, private airstrip, 400-capacity prison block. The design itself is evidence of intent."]},{title:"Key Moral Agents",pts:["Ishii + officers: trained scientists who chose lethal experimentation over ethical alternatives. Knew exactly what they were doing.","3,000+ researchers: recruited from elite universities, many voluntarily. Designed protocols, ran experiments, recorded data. Made professional choices.","Japanese state: imperial authorization, hidden funding inside military budget, sustained the program a decade. Not rogue — state-supported.","U.S. (post-war): granted immunity to Unit 731 leaders in exchange for their data — while simultaneously prosecuting Nazi doctors at Nuremberg for identical crimes."]},{title:"The Experiments + Maruta System",pts:['Maruta = "logs" — official administrative term, not slang. Institutionalized dehumanization: removed subjects from moral consideration, made participation feel routine.',"Victims: primarily Chinese POWs and civilians, Soviet soldiers, Koreans, Mongolians, some Allied prisoners. Defined by vulnerability, not by any action.","Deliberate infection: plague, cholera, anthrax, typhoid, dysentery via injection, ingestion, exposure. Multiple infection cycles on the same subject.","Vivisection without anesthesia. Frostbite via ice water immersion. Pressure chambers until rupture. Field weapons testing (staked outside, exposed to biological/chemical shells).","Field deployment: Ningbo 1940 (plague-infected fleas from aircraft), Changde 1941. 60+ affiliated units across China, Korea, SE Asia — all under epidemic prevention cover."]},{title:"Core Decisions",pts:["Decision 1 — Ishii: chose human experimentation when ethical alternatives existed (vaccines, sanitation — other nations' military programs were doing this).","Decision 2 — Army/State: authorized and sustained the program continuously for 10+ years.","Decision 3 — Researchers: participated voluntarily as trained scientific professionals.","Decision 4 — August 1945: Ishii ordered surviving subjects executed, records burned, facility demolished. This PROVES they knew it was wrong. You only destroy evidence when you know."]},{title:"Outcomes & Consequences",pts:["~3,000 documented deaths at Pingfang. Up to 300,000+ including field biological weapons operations — range is wide because records were deliberately burned.","1949 Khabarovsk Trials: USSR convicted 12 captured members. West dismissed it as propaganda (because U.S. already had immunity deal in place).","MacArthur approved immunity: data transferred to U.S. Army program at Fort Detrick. Ishii died free in 1959.","Nuremberg comparison: same years, seven Nazi doctors executed for experiments of directly comparable character. Same crimes. The difference was a U.S. strategic choice, not a factual difference."]}]},{id:"p2",label:"Part 2 — Sab",color:"#1D9E75",sublabel:"Ethical Analysis",tagline:"WHY IT WAS WRONG. 5 philosophical frameworks.",sections:[{title:"Consequentialism / Utilitarianism",pts:["Key question: Do the ends justify the means?","The MEANS: thousands of deaths in extreme suffering. Vivisection, disease exposure, chemical agents. Documented and unrecorded.",'The ENDS: any "benefit" served military power only — not human wellbeing or science/medicine advancement. The National Mobilization Law (1938) institutionalized this.',"Utilitarian verdict: Greatest good for greatest number NOT achieved. A majority was sacrificed for a minority to benefit.",'Even the "benefit" was destructive — aimed at biological warfare, not progress. So the purpose itself fails the utilitarian standard.',"Conclusion: fails to produce morally justifiable outcomes, results in overwhelming harm."]},{title:"Deontology — Kant's 3 Categorical Imperatives",pts:["(1) Universal Law: Act only by maxims you could will to be universal law for everyone. If human experimentation and disregard for dignity were universalized — no social order, no respect for persons, moral society collapses.","(2) Humanity Formula: Always treat humanity as an END, never merely as a MEANS. Unit 731 used people purely as tools. No consent, no autonomy, no recognition of personhood.","(3) Kingdom of Ends / Autonomy: Act as if you are both ruler and follower of your own laws. You cannot impose on others what you would reject for yourself.","Conclusion: violates all three formulations. Reduces human beings to mere instruments."]},{title:"Rights-Based Ethics",pts:["All humans have inherent rights: right to life, right to liberty, right to dignity.","These rights exist independently of law, government, wartime status, prisoner status, or nationality. Pre-legal — not created by law.","Unit 731: stripped all fundamental rights, denied autonomy and protection, eliminated consent and justice.","Conclusion: completely disregards the inherent rights of every human being."]},{title:"Virtue Ethics (Aristotle)",pts:["Character is formed through repeated action. What we repeatedly do becomes who we are.","Unit 731 did not happen overnight — it required systemic, structural support built over time.","Researchers lacked PHRONESIS: practical wisdom — the ability to perceive a moral wrong AND have the character to act on that perception.","Their institutional environment trained them toward compliance, not moral discernment.","Conclusion: exposes a cultivated disposition toward cruelty and indifference — a corruption of character at both individual and institutional levels."]},{title:"Kohlberg's Stages of Moral Development",pts:["Stage 4 (where researchers were): conventional morality. Follow institutional rules, defer to authority, fulfill role expectations. Don't question whether the rules are just.",'Stages 5 & 6 (post-conventional): evaluate rules against universal principles. Ask: "Is this system actually right?" Override institutional commands when they violate human dignity.',"The researchers never reached Stages 5 or 6.","Core moral failure: not ignorance of right and wrong — but ARRESTED MORAL DEVELOPMENT. Obedience felt like enough. Moral character was lost to compliance."]},{title:"Conclusion (Sab)",pts:["Consequentialism: fails to produce morally justifiable outcomes, results in overwhelming harm.","Deontology: violates fundamental moral duties, reduces humans to mere instruments.","Rights-based ethics: completely disregards inherent human rights.","Virtue ethics: exposes corruption of character — not just individual, but systemic.","Kohlberg: arrested moral development — obedience mistaken for morality.","Unit 731 was not just unethical because it caused harm — it represents a complete collapse of moral reasoning."]}]},{id:"p3",label:"Part 3 — Mateo",color:"#534AB7",sublabel:"Moral Insight",tagline:"WHAT SHOULD HAVE BEEN DONE — and why that is the ethical choice.",sections:[{title:"Ishii & Officers — Should have refused",pts:["What he should have done: Refused to establish the program.","Ethical alternative: Defensive research — frostbite treatment, disease prevention, field sanitation — same stated military objective, zero human experimentation. Other nations' military medical corps did exactly this.","Kohlberg explanation: Ishii operated at Stage 2 — instrumental self-interest. Career advancement and self-preservation drove decisions. Post-conventional reasoning (Stage 5/6) would recognize no career objective overrides human dignity.","Refusing would have cost him position and funding. But the cost of doing the right thing doesn't change the fact that it's right."]},{title:"Researchers — Should have refused",pts:["What they should have done: Refuse procedures on living subjects, report/unveil through available channels (sabotage), or at minimum document for future accountability.","Why it was hard: young physicians at an already-running institution. Enormous pressure: military hierarchy, peer behavior, maruta language normalizing subjects as non-persons.","Kohlberg: stuck at Stage 4 — follow rules, defer to authority, do what role demands.","Why refusal was still right: moral maturity (Stages 5/6) recognizes institutional orders don't automatically carry moral authority.","Crito's principle: never do wrong, even when the system demands it, even at personal cost (dishonor).","What was needed: PHRONESIS + moral courage — not just perceiving the wrong, but having the CHARACTER to act against it."]},{title:"Japanese State — Should have built protective institutions",pts:["What they should have done: Build apparatus designed to protect rather than exploit.","Aquinas's third secondary precept: society must be well-ordered for human flourishing. State's function = create conditions for people to pursue their natural ends, not use them as expendable material.","A state that does the latter has corrupted its own purpose by definition."]},{title:"U.S. Government — Should have prosecuted",pts:["What they should have done: Prosecuted.","The surface utilitarian case for immunity: data might protect future lives → acquiring it maximizes good. This IS a genuine moral tension. Justice for the past vs. potential protection of lives in the future.","Why prosecution was still right: The utilitarian argument collapses because the PRECEDENT is catastrophic. If atrocities are forgivable when results are useful, you create an incentive to commit them.","Beyond outcomes: the deal treated victims' suffering as a resource to harvest — their pain traded for their torturers' freedom, without victims' consent.","Nuremberg showed prosecution was possible. The U.S. chose strategic advantage over justice."]},{title:"Conclusion — Mateo's deeper point",pts:["Moral tension: For these people in Imperial Japan, obedience wasn't just institutional pressure — it was tied to cultural identity. Loyalty to the Emperor, devotion to the state, family honor. Disobeying meant dishonor for your entire family.","Mateo acknowledges this is real tension, not to be dismissed.","Antigone parallel: Creon's law carried civic authority; defying it meant death. She chose divine law over the king's decree.","Socrates parallel: could have escaped and lived, but recognized the just life and the good life are the same, even ending in a prison cell.","When worldly obligations (imperial loyalty, career) conflict with universal principles (human dignity, preservation of life) — the universal supersedes the worldly. That IS the point of post-conventional moral reasoning.","Final line: The moral agents had access to these ideas. What they lacked was the development and the courage to act on them."]}]}];function p(){let[e,t]=(0,l.useState)("p1"),[n,r]=(0,l.useState)(0),a=h.find(t=>t.id===e);return(0,o.jsxs)("div",{children:[(0,o.jsx)("div",{style:{marginBottom:14,padding:"10px 14px",background:"#161514",borderRadius:8,border:"1px solid #252320"},children:(0,o.jsx)("p",{style:{fontSize:13,color:"#8a8278",fontFamily:"Georgia",margin:0,lineHeight:1.7},children:"You could be called on any part. Read yours deepest, then skim the others for the headlines. The Defense tab has model answers for anything the professor might ask."})}),(0,o.jsx)("div",{style:{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"},children:h.map(n=>(0,o.jsxs)("button",{onClick:()=>{t(n.id),r(0)},style:{padding:"7px 13px",borderRadius:6,border:`1px solid ${e===n.id?n.color:"#252320"}`,background:e===n.id?n.color+"22":"transparent",color:e===n.id?n.color:"#8a8278",fontFamily:"system-ui",fontSize:12,cursor:"pointer",fontWeight:e===n.id?700:400,textAlign:"left"},children:[(0,o.jsx)("div",{children:n.label}),(0,o.jsx)("div",{style:{fontSize:10,opacity:.65},children:n.sublabel})]},n.id))}),(0,o.jsx)("div",{style:{marginBottom:14,padding:"9px 13px",background:a.color+"18",border:`1px solid ${a.color}44`,borderRadius:8},children:(0,o.jsx)("p",{style:{fontSize:13,color:a.color,fontFamily:"system-ui",margin:0,fontWeight:700},children:a.tagline})}),(0,o.jsx)("div",{style:{display:"flex",flexDirection:"column",gap:8},children:a.sections.map((e,t)=>(0,o.jsxs)("div",{style:{border:`1px solid ${n===t?a.color:"#252320"}`,borderRadius:8,overflow:"hidden",background:"#161514"},children:[(0,o.jsxs)("button",{onClick:()=>r(n===t?null:t),style:{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left"},children:[(0,o.jsx)("span",{style:{fontSize:13,color:"#f0ece4",fontWeight:600,fontFamily:"system-ui"},children:e.title}),(0,o.jsx)("span",{style:{color:"#4a4845",fontSize:12},children:n===t?"▲":"▼"})]}),n===t&&(0,o.jsx)("div",{style:{padding:"0 16px 14px",borderTop:"1px solid #252320"},children:(0,o.jsx)("ul",{style:{listStyle:"none",margin:"10px 0 0",padding:0,display:"flex",flexDirection:"column",gap:7},children:e.pts.map((e,t)=>(0,o.jsxs)("li",{style:{display:"flex",gap:8,alignItems:"flex-start"},children:[(0,o.jsx)("span",{style:{color:a.color,flexShrink:0,marginTop:3,fontSize:12},children:"—"}),(0,o.jsx)("span",{style:{fontSize:13,color:"#c8c0b4",lineHeight:1.75,fontFamily:"Georgia"},children:e})]},t))})})]},t))})]})}var l=a("bb5Bq");let m=[{label:"Part 1 — Your Section",color:"#b8943a",qas:[{hot:!0,q:"Why does this belong in Ethics in Science and not just war crimes?",a:"Because the perpetrators were trained scientists and physicians who used the methods of science — controlled protocols, systematic data collection, research documentation — while violating every obligation of their profession. Soldiers kill. These people were conducting research. That's the distinction. It's not just that harm occurred — it's that the identity and methodology of science were weaponized against the people those methods were meant to serve."},{hot:!0,q:"Why did the U.S. grant immunity instead of prosecuting?",a:"American biological warfare investigators assessed that the data — derived from human subjects and not ethically replicable — was militarily unique. With the Cold War beginning, they didn't want the Soviets accessing it through a public trial. So MacArthur approved full immunity in exchange for the data, which went to Fort Detrick. The irony is that this happened at the same time the U.S. was prosecuting Nazi doctors at Nuremberg for the exact same category of crime. It was a strategic choice, not a factual difference between the two programs."},{hot:!1,q:"Why is there such a wide range in death estimates (3,000 vs 300,000+)?",a:"3,000 refers to documented deaths at Pingfang specifically — from post-war testimony and surviving records. 300,000+ includes field biological weapons deployments, 60+ affiliated units, and indirect casualties from engineered disease outbreaks across China and Asia. We can't be precise because Ishii ordered the records destroyed in August 1945. The wide range is itself a consequence of the deliberate cover-up."},{hot:!1,q:"What happened to Ishii after the war?",a:"He cooperated fully with American investigators, gave them complete access to the research data, and was granted full immunity. He lived freely in Japan and died of throat cancer in 1959 at age 67. Never arrested. Never tried. Many researchers returned to prominent civilian careers — some co-founded pharmaceutical companies still operating today."},{hot:!1,q:"Did the unit do any legitimate public health work?",a:"The broader network of units did some genuine epidemic prevention for Japanese troops — water sanitation, disease surveillance. But Pingfang itself was exclusively for weapons development and human experimentation. The public health framing was institutional cover, not a secondary mission. The facility's own design — crematorium, weapons testing fields, private airstrip — is inconsistent with a public health purpose."}]},{label:"Part 2 — Sab's Frameworks",color:"#1D9E75",qas:[{hot:!0,q:"Under utilitarianism, couldn't someone argue the data saved more lives?",a:"Two answers. First, empirically: the data was largely assessed by U.S. investigators as methodologically flawed — poor controls, unreliable generalizability. No documented major breakthrough resulted from it. Second, rule utilitarian: if you permit medical institutions to sacrifice non-consenting individuals for claimed greater goods, you destroy social trust in medicine globally — the long-term indirect cost dwarfs any claimed benefit. The utilitarian case collapses on its own terms."},{hot:!1,q:"Kant's universal law — couldn't a researcher argue they had a duty to protect Japan?",a:"No. Universalizability requires the maxim to hold for ALL rational agents, not members of one nation. The maxim \"researchers may kill non-consenting subjects from enemy populations to advance national military power\" destroys itself when universalized — no one is safe from any state's research agenda. It fails the formula of universal law because it's contingent on national membership, not rational agency."},{hot:!1,q:"Rights-based ethics: there was no international law against this in 1940.",a:"That's precisely the point of rights-based ethics. Rights are pre-legal — they exist and are morally binding whether or not law recognizes them. The Nuremberg Code (1947) didn't create these rights; it recognized them in response to their violation. The absence of codification doesn't mean the moral obligation was absent. Rights-based ethics grounds obligation in humanity, not legislation."},{hot:!1,q:"What's the difference between Kohlberg Stage 4 and Stage 5?",a:'Stage 4: follow institutional rules because they are the rules. You don\'t question whether the rules are just. Stage 5: evaluate rules against universal principles — ask "is this system actually right?" not just "what does the system require?" The researchers were at Stage 4 because they accepted the institutional framing (maruta, military hierarchy, research mission) as sufficient moral justification without ever asking if the system itself was legitimate.'},{hot:!1,q:"Virtue ethics applies to individuals — how does it apply to Unit 731 as an institution?",a:"Institutions shape individual character through reward structures, language, norms, and hierarchy. Unit 731's design — the maruta classification, prohibition on learning victims' names, peer culture — actively cultivated vices rather than virtues. The institution is culpable not as a moral agent itself, but as a structure that systematically prevented the development of phronesis and moral courage in its members. Contemporary virtue ethics supports this extension."}]},{label:"Part 3 — Mateo's Moral Insight",color:"#534AB7",qas:[{hot:!0,q:"What should Ishii have done? Is it realistic to expect him to refuse?",a:"He should have refused to establish the program. The ethical alternative wasn't hypothetical — defensive medical research (vaccines, disease prevention, field sanitation) served the same stated military objective without human experimentation. Other nations' military medical corps were doing exactly this. Through Kohlberg, Ishii operated at Stage 2 — instrumental self-interest. Post-conventional reasoning would recognize that no career objective overrides human dignity. Refusing would have cost him his position. That doesn't change that it was right."},{hot:!0,q:"What is phronesis and why does it matter for this case?",a:"Phronesis is Aristotle's term for practical wisdom — the trained ability to perceive a moral situation correctly AND have the character to act on that perception. It's not the same as intelligence or education. The researchers had the intellectual capacity to see what was happening. Post-war testimonies confirm many were uncomfortable. What they lacked was the habituation of moral courage — the character developed through repeated ethical choice that enables action against institutional pressure at personal cost. Phronesis requires both perception AND courage."},{hot:!0,q:"What's Mateo's conclusion — the deepest lesson of the case?",a:"That moral failure isn't only done by evil people. It's done by educated professionals whose moral reasoning stays at the conventional level — who follow orders without questioning, who treat their role as permission to stop thinking. Mateo uses Antigone (chose divine law over Creon's authority despite death) and Socrates (chose just life over escape, even in a prison cell) as examples of post-conventional reasoning. When worldly obligations (imperial loyalty, career, family honor) conflict with universal principles (human dignity, preservation of life), the universal supersedes. That IS the point of post-conventional moral reasoning."},{hot:!1,q:"What should the U.S. have done and why was immunity wrong?",a:"Prosecuted. Mateo acknowledges there's genuine moral tension — the utilitarian case for immunity (data might protect future lives) is a real argument. But it collapses because the precedent is catastrophic: if atrocities are forgivable when results are useful, you create an incentive to commit them. Beyond outcomes, the deal treated victims' suffering as a resource — their pain traded for their torturers' freedom, without victims' consent. Nuremberg showed prosecution was possible. The U.S. chose strategic advantage over justice."},{hot:!1,q:"How is the Crito principle applied to the researchers?",a:"The Crito's core principle is: never do wrong, even when the system demands it, even at severe personal cost. Mateo applies this to the researchers' situation — refusal was costly (dishonor, not just to themselves but to their families under Japanese cultural norms). Mateo acknowledges this tension explicitly. But the principle holds: the possibility of refusal existed. Some individuals did request transfers or document what was happening. The Crito establishes the moral standard; the documented cases of refusal show it was achievable, even if rare."}]}];function g(){let[e,t]=(0,l.useState)(0),[n,r]=(0,l.useState)(new Set),[a,i]=(0,l.useState)(new Set),s=m.flatMap((e,t)=>e.qas.map((e,n)=>`${t}-${n}`)),u=s.length?Math.round(a.size/s.length*100):0;function c(e,t,n){let r=new Set(e);r.has(t)?r.delete(t):r.add(t),n(r)}let d=m[e];return(0,o.jsxs)("div",{children:[(0,o.jsxs)("div",{style:{marginBottom:14},children:[(0,o.jsxs)("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4},children:[(0,o.jsx)("span",{style:{fontSize:11,color:"#8a8278",fontFamily:"system-ui"},children:"Questions mastered"}),(0,o.jsxs)("span",{style:{fontSize:11,color:"#b8943a",fontFamily:"system-ui",fontWeight:700},children:[a.size," / ",s.length]})]}),(0,o.jsx)("div",{style:{height:4,background:"#252320",borderRadius:2,overflow:"hidden"},children:(0,o.jsx)("div",{style:{height:"100%",background:"#b8943a",borderRadius:2,width:`${u}%`,transition:"width 0.4s"}})})]}),(0,o.jsx)("div",{style:{padding:"10px 14px",background:"#0d1a14",border:"1px solid #1a5c4a",borderRadius:8,marginBottom:14},children:(0,o.jsxs)("p",{style:{fontSize:12,color:"#1a5c4a",fontFamily:"system-ui",margin:0},children:[(0,o.jsx)("strong",{children:"How:"})," Click to reveal. Try answering in your head first. 🔥 = most likely to be asked. Mark mastered when you can say the gist without reading."]})}),(0,o.jsx)("div",{style:{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"},children:m.map((n,r)=>(0,o.jsx)("button",{onClick:()=>t(r),style:{padding:"6px 12px",borderRadius:6,border:`1px solid ${e===r?n.color:"#252320"}`,background:e===r?n.color+"22":"transparent",colo }),(0,o.jsx)("p",{style:{fontSize:13,color:"#8a8278",fontFamily:"Georgia",margin:"0 0 6px",fontStyle:"italic"},children:'"Why is this Ethics in Science and not just a war crime?"'}),(0,o.jsx)("p",{style:{fontSize:14,color:"#c8c0b4",fontFamily:"Georgia",lineHeight:1.85,margin:0,borderLeft:"2px solid #b8943a",paddingLeft:12},children:"\"Unit 731 operated as a formal scientific and medical research institution — using controlled protocols, systematic data recording, and the professional identity of trained physicians. The perpetrators made choices as scientists, not just as soldiers. The issue isn't only that harm occurred. It's that the methods and identity of science were weaponized against the people those methods were supposed to serve. That's what makes it Ethics in Science.\""})]})]})}let y=[{icon:"💧",title:"Stop the coffee. Drink water right now.",color:"#1a5c4a",body:`You are already caffeinated enough. Adding more coffee will spike your cortisol further, increase anxiety, and make the "tired eyes but wired body" feeling worse. Caffeine at this point is not giving you energy \u{2014} it's borrowing energy from your already-depleted reserves and the debt comes due right around 5-6 PM when you need to be sharp.

What water does: your brain is 73% water. Even mild dehydration (1-2%) measurably impairs concentration, working memory, and verbal recall \u{2014} exactly the things you need for a defense Q&A. Drink one full glass right now. Then keep sipping throughout.`},{icon:"🍌",title:"Eat something — glucose is not optional",color:"#b8943a",body:`Your brain runs on glucose. At 4 hours of sleep, your glucose regulation is already impaired \u{2014} meaning your brain burns through energy faster and replenishes it less efficiently. The jittery-but-foggy feeling is partly this.

Eat something real: rice, bread, a banana, biscuits, anything. Don't eat heavy (it causes a blood sugar crash 90 minutes later \u{2014} right when you need to present). Aim for moderate carbs + anything with protein. If you can eat within the next 20 minutes, you'll notice a real difference in how your thinking feels by 3 PM.`},{icon:"🚶",title:"Walk for 5 minutes — seriously, right now",color:"#b8943a",body:`The jitters you feel are caffeine triggering your sympathetic nervous system (fight-or-flight). That system released adrenaline and norepinephrine. The way to metabolize those is physical movement \u{2014} the same way animals shake after a frightening experience.

You don't need to exercise. Just walk the hallway slowly once or twice. Physical movement signals to your nervous system that the "threat" has passed, which activates your parasympathetic system (rest-and-digest), which allows your prefrontal cortex \u{2014} the part you need for memory and speech \u{2014} to come back online properly.`},{icon:"⚡",title:"You have a 90-minute peak window right now",color:"#c0392b",body:`The caffeine you took is probably peaking right around 2-3 PM. That means your alertness \u{2014} while uncomfortable \u{2014} is real. Use it. The 2:15-3:45 PM window is your highest-quality study time today.

After that, around 4-5 PM, expect a dip. This is normal and predictable. That's why the plan has a mandatory break at 4:00. Don't fight it. The break is not wasted time \u{2014} it's what makes your 4:30-5:00 study block actually stick. Sleep-deprived brains learn in shorter spurts and need more rest intervals. Work with this, not against it.`},{icon:"😮‍💨",title:'The "tired but wired" feeling — what it is and how to manage it',color:"#534AB7",body:`What you're feeling is adenosine buildup (sleep pressure \u{2014} the literal chemical signal of tiredness) competing with caffeine (which blocks adenosine receptors). You feel wired because caffeine is blocking the signal, but the adenosine is still there accumulating underneath. When the caffeine wears off, all that adenosine will hit at once \u{2014} that's the crash.

How to manage it now:
1. Don't add more caffeine. Extending the block just makes the crash worse and later.
2. Slow, deep breathing (4 counts in, hold 4, out 6) activates your vagus nerve and reduces the subjective jitter feeling without reducing alertness.
3. The tired eyes feeling is eye strain + dehydration. Blink deliberately and look at something 20 feet away for 20 seconds every 20 minutes (20-20-20 rule).
4. Accept that you won't feel at 100%. You don't need 100%. You need 70% and the right prep. You have the prep.`},{icon:"🧠",title:"Memory on 4 hours of sleep — what actually works",color:"#534AB7",body:`Sleep-deprived memory works differently. What changes:
- Working memory (holding multiple things at once) is reduced. This is why your script should be chunked by slide, not memorized as one long thing.
- Procedural/verbal memory (things you've said aloud multiple times) is more resilient than declarative memory (things you read). This is why saying the script out loud beats reading it.
- Rest intervals help consolidation. A 20-30 minute break after studying is more effective than continuous studying, especially on low sleep.
- Emotional salience helps. The things you feel something about are remembered better. The maruta system, the Nuremberg comparison, Decision 4 (evidence destruction) \u{2014} these are emotionally resonant. They will be easier to recall.

The strategy: say things aloud, take real breaks, and trust the emotional anchors in the material.`},{icon:"😴",title:"About the tiredness — don't fight it, work around it",color:"#6b6359",body:`You cannot fix 4 hours of sleep in 4 hours. What you can do is work in focused 45-minute blocks with real breaks, drink water, eat something, and trust that the preparation you did last night \u{2014} even imperfect \u{2014} is in your head.

One thing you can do at 4:00 PM: find a quiet spot, set a timer for 20 minutes, and close your eyes. You don't have to fall asleep. Eye closure alone reduces cognitive fatigue significantly. If you do drift off, even 10-15 minutes of sleep has been shown to improve alertness and recall for 1-3 hours afterward \u{2014} long enough to get you through to 8 PM.
